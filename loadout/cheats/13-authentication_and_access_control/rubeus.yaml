tool: rubeus
tags:
- m13
- auth
- ad
exam_hint: 'Rubeus is a C# toolset for raw Kerberos interaction and abuses. It interacts with the Local Security Authority (LSA) to impersonate or forge Kerberos tickets (TGT, TGS), performing Kerberos-based attacks like pass-the-ticket, kerberoasting, and AS-REP roasting in Active Directory environments. Strategy: Map AD attack paths with BloodHound before spraying; target AS-REP roastable and SPN accounts; respect lockout thresholds.'
docs:
- https://github.com/GhostPack/Rubeus
- https://specterops.io
