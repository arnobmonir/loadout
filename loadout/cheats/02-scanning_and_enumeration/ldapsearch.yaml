tool: ldapsearch
tags: [enumeration, ldap, m02]
exam_hint: "ldapsearch queries Active Directory and LDAP servers — find users, groups, computers, and sensitive attributes without logging into a domain."
docs:
  - "man:ldapsearch"

actions:
  - title: Discover LDAP base DN
    desc: Queries the root of the LDAP tree to find the naming contexts (base DN) for further searches. Lab targets only.
    command: "ldapsearch -x -H ldap://{{ip}} -s base namingContexts"

  - title: Anonymous LDAP search
    desc: Attempts an unauthenticated LDAP query — works when anonymous binding is allowed on the domain controller.
    command: "ldapsearch -x -H ldap://{{ip}} -b '' '(objectClass=*)'"

  - title: List all domain users
    desc: Searches for all user accounts in Active Directory — returns usernames and attributes.
    command: "ldapsearch -x -H ldap://{{ip}} -b 'DC={{domain}},DC=local' '(objectClass=user)' cn"

  - title: Find kerberoastable accounts
    desc: Searches for user accounts with Service Principal Names (SPNs) — targets for Kerberoasting attacks.
    command: "ldapsearch -x -H ldap://{{ip}} -b 'DC={{domain}},DC=local' '(&(samAccountType=805306368)(servicePrincipalName=*))' displayName servicePrincipalName"

  - title: List all domain groups
    desc: Retrieves all security and distribution groups with their members and descriptions.
    command: "ldapsearch -x -H ldap://{{ip}} -b 'DC={{domain}},DC=local' '(objectClass=group)' cn description member"

  - title: Authenticated LDAP search
    desc: Binds with a username and password for full access to LDAP data on the domain controller.
    command: "ldapsearch -x -H ldap://{{ip}} -D 'cn={{user|admin}},dc={{domain}},dc=local' -w {{pass|password}} -b 'DC={{domain}},DC=local' '(objectClass=*)'"

  - title: Find all domain computers
    desc: Lists all computer accounts joined to the domain — reveals workstations, servers, and DCs.
    command: "ldapsearch -x -H ldap://{{ip}} -b 'DC={{domain}},DC=local' '(objectClass=computer)' cn operatingSystem"
