tool: ffuf
tags: [enumeration, web, m02]
exam_hint: "ffuf is a fast web fuzzer — finds hidden directories, files, parameters, and virtual hosts by replacing FUZZ with wordlist entries."
docs:
  - https://github.com/ffuf/ffuf

actions:
  - title: Fuzz for hidden directories
    desc: Replaces FUZZ in the URL with each wordlist entry to find hidden directories and files. Lab targets only.
    command: "ffuf -u {{url|http://example.com}}/FUZZ -w {{wordlist|/usr/share/wordlists/dirb/common.txt}} -mc 200,301,302"

  - title: Filter out a specific response size
    desc: Hides responses of a specific size (like 4242 bytes) to filter out generic error pages and focus on real hits.
    command: "ffuf -u {{url|http://example.com}}/FUZZ -w {{wordlist|/usr/share/wordlists/dirb/common.txt}} -fs 4242"

  - title: Discover virtual hosts by Host header
    desc: Fuzzes the Host header to find websites hosted on the same IP but with different domain names.
    command: "ffuf -u {{url|http://example.com}}/ -H 'Host: FUZZ.{{domain}}' -w {{wordlist|/usr/share/wordlists/subdomains.txt}}"

  - title: Fuzz GET parameter values
    desc: Tests different values for a URL parameter to find valid inputs, IDs, or injection points.
    command: "ffuf -u '{{url|http://example.com}}/page?param=FUZZ' -w {{wordlist|/usr/share/wordlists/dirb/common.txt}}"

  - title: Fuzz POST data fields
    desc: Tests different values in POST request body fields — useful for finding hidden form parameters.
    command: "ffuf -u {{url|http://example.com/login}} -X POST -d 'username=admin&password=FUZZ' -w {{wordlist|/usr/share/wordlists/rockyou.txt}}"

  - title: Save results to JSON
    desc: Runs the fuzz scan and exports all matches to a JSON file for further analysis.
    command: "ffuf -u {{url|http://example.com}}/FUZZ -w {{wordlist|/usr/share/wordlists/dirb/common.txt}} -o {{output|ffuf.json}} -of json"
