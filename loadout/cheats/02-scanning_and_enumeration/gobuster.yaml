tool: gobuster
tags: [enumeration, web, m02]
exam_hint: "gobuster brute-forces hidden directories, DNS subdomains, and virtual hosts on web servers using wordlists."
docs:
  - https://github.com/OJ/gobuster

actions:
  - title: Find hidden directories on a website
    desc: Tries thousands of common directory names (admin, backup, config) against a web server to find hidden pages. Lab targets only.
    command: "gobuster dir -u {{url|http://example.com}} -w {{wordlist|/usr/share/wordlists/dirb/common.txt}} -t 50"

  - title: Find hidden directories quietly
    desc: Same directory scan but hides error messages — cleaner output for saving to a file.
    command: "gobuster dir -u {{url|http://example.com}} -w {{wordlist|/usr/share/wordlists/dirb/common.txt}} -q"

  - title: Save found directories to a file
    desc: Brute-forces directories and writes all discovered paths to a text file.
    command: "gobuster dir -u {{url|http://example.com}} -w {{wordlist|/usr/share/wordlists/dirb/common.txt}} -o {{output|gobuster-dirs.txt}}"

  - title: Discover virtual hosts
    desc: Tests different Host header values to find hidden websites on the same IP — finds sites not in DNS.
    command: "gobuster vhost -u {{url|http://example.com}} -w {{wordlist|/usr/share/wordlists/subdomains.txt}}"

  - title: Brute-force DNS subdomains
    desc: Tries subdomain names against the target domain's DNS to find hidden hosts.
    command: "gobuster dns -d {{domain}} -w {{wordlist|/usr/share/wordlists/dnsmap.txt}}"

  - title: Scan with file extensions
    desc: Appends extensions like .php, .html, .bak to each word — finds backup files and scripts.
    command: "gobuster dir -u {{url|http://example.com}} -w {{wordlist|/usr/share/wordlists/dirb/common.txt}} -x php,html,txt,bak"
