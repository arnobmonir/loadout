exam_hint: 'Dnsmasq is a lightweight DNS and DHCP server for small networks. It''s commonly used on embedded systems, routers, and is popular for local domain resolution and DHCP assignment. In penetration testing, it can be weaponized for DNS spoofing and DHCP attacks. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
