- attack
exam_hint: 'Tor Browser is a free, open-source web browser that enables anonymous internet browsing through the Tor network. It routes traffic through multiple encrypted layers (onion routing) across distributed volunteer nodes, making it extremely difficult to trace user identity and activity. For CEH practitioners, Tor Browser provides access to onion-based resources and anonymized reconnaissance. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run'
