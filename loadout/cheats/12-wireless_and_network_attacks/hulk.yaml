exam_hint: 'HULK (HTTP Unbearable Load King) is a web server stress testing and DDoS attack tool that generates obfuscated, unique HTTP traffic. Unlike simpler tools like LOIC, HULK creates randomized requests designed to evade detection while overwhelming target servers through resource exhaustion. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
