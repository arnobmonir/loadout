exam_hint: 'The Invisible Internet Project (I2P) is an anonymous, decentralized overlay network designed for internal communication and services. Unlike Tor, which primarily anonymizes access to the regular internet, I2P focuses on hosting hidden services ("eepsites") within its own network. Traffic is encrypted end-to-end and routed through a distributed peer-to-peer network of volunteer nodes. > See also: I Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs;'
