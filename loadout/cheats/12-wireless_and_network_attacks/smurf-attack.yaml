tool: smurf-attack
tags:
- m12
- wireless
- attack
exam_hint: 'SMURF Attack is a denial-of-service attack that exploits ICMP echo request broadcasts. The attacker sends ICMP Echo Request packets (ping) with a spoofed source IP address (target''s IP) to a broadcast address, causing all hosts on that network to send ICMP Echo Replies back to the target. This creates a one-to-many amplification effect, overwhelming the target with traffic. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside '
