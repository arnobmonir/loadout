exam_hint: 'Tails (The Amnesic Incognito Live System) is a privacy-focused live operating system designed to be booted from a USB drive or DVD. It routes all internet traffic through the Tor network and leaves no trace on the host computer by default. It is widely used for anonymous activities and operational security in hostile environments. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
