exam_hint: 'ARP-GUARD is a Windows utility designed to protect systems against ARP (Address Resolution Protocol) spoofing attacks. ARP spoofing is a common network attack where attackers forge ARP replies to redirect network traffic through their system. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
