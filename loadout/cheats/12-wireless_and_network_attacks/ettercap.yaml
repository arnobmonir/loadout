tool: ettercap
tags:
- m12
- wireless
- attack
exam_hint: 'Ettercap is a comprehensive suite for man-in-the-middle attacks on LAN. It features sniffing of live connections, content filtering, and many other interesting tricks. It supports active and passive dissection of many protocols and includes many features for network and host analysis. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
