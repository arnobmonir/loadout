exam_hint: 'Hping is a command-line utility for sending custom ICMP, TCP, or UDP packets to network hosts. It''s similar to the ping command but with much more control over packet contents, allowing for network testing, firewall analysis, and advanced network reconnaissance. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
