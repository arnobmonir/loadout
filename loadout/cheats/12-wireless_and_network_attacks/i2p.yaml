exam_hint: 'I2P (Invisible Internet Project) is a decentralized, open-source network layer for anonymous communication and content distribution. Like Tor, it provides network anonymity through layered encryption and decentralized routing, with built-in support for hidden services and peer-to-peer applications. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
