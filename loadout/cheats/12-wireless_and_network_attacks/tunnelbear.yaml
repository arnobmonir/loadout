exam_hint: 'TunnelBear is a consumer VPN service that encrypts internet traffic and routes it through servers in over 40 countries. It masks the user''s real IP address by replacing it with the VPN server''s IP, enabling evasion of geographic restrictions, IP-based firewall rules, and network-level monitoring. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
