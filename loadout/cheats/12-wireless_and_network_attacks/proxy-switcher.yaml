tool: proxy-switcher
tags:
- m12
- wireless
- attack
exam_hint: 'Proxy Switcher is a Windows application that enables users to automatically route internet traffic through a chain of public or private proxy servers. It retrieves and validates proxy lists, then switches between them on demand or on a schedule, allowing attackers to mask their true IP address during scanning and reconnaissance activities. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
