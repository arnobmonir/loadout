exam_hint: 'Whonix is a privacy-focused operating system designed to provide strong anonymity by routing all internet traffic through the Tor network. It consists of two virtual machines: a Gateway (running Tor) and a Workstation (where all user activity takes place), isolating the user''s real IP at the OS level. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
