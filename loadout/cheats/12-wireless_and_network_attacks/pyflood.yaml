exam_hint: 'PyFlood is a lightweight, Python-based HTTP DDoS tool designed for simplicity and ease of use. It provides straightforward HTTP flooding capabilities with minimal configuration, making it an educational tool for understanding HTTP-based DDoS attacks and network stress testing. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
