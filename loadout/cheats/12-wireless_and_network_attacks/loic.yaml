exam_hint: 'LOIC (Low Orbit Ion Cannon) is a network stress testing and DDoS attack tool. It was popularized by Anonymous hacktivists. LOIC can generate traffic floods against targets, making services unavailable. It''s useful for authorized network stress testing but illegal for unauthorized attacks. Strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing tools to test VLANs; never run DDoS outside isolated lab nets.'
