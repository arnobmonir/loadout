tool: domaintools-whois
tags: [recon, passive, whois, m01]
exam_hint: "DomainTools is a premium WHOIS portal that shows current registration info plus historical records — useful when CLI whois data is redacted or incomplete."
docs:
  - https://whois.domaintools.com/

actions:
  - title: Look up domain registration history
    desc: Opens DomainTools to show who registered this domain, past owners, and registration changes over time. Lab targets only.
    command: "xdg-open https://whois.domaintools.com/{{domain}}"

  - title: Look up IP address ownership
    desc: Shows which organization owns this IP block, including historical ownership changes.
    command: "xdg-open https://whois.domaintools.com/{{ip}}"

  - title: See all domains on the same IP
    desc: Opens DomainTools reverse IP view to find other domains hosted on the same server as your target.
    command: "xdg-open https://reverseip.domaintools.com/search/?q={{ip}}"
