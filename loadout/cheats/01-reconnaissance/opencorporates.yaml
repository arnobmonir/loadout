tool: opencorporates
tags: [recon, osint, m01]
exam_hint: "OpenCorporates is the world's largest open database of companies. Look up who runs a company, find subsidiaries, officers, and registered addresses."
docs:
  - https://opencorporates.com/

actions:
  - title: Search for a company by name
    desc: Opens OpenCorporates to search for a company — shows directors, registered address, incorporation date, and status. Lab targets only.
    command: "xdg-open https://opencorporates.com/companies?q={{keyword|example+corp}}"

  - title: Find all companies at an address
    desc: Searches for every company registered at a specific address — reveals shell companies and related entities sharing an office.
    command: "xdg-open https://opencorporates.com/companies?registered_address={{keyword|123+Main+St}}"

  - title: Look up a company officer or director
    desc: Searches for a person by name to find all companies they are associated with as director or officer.
    command: "xdg-open https://opencorporates.com/officers?q={{keyword|John+Smith}}"
