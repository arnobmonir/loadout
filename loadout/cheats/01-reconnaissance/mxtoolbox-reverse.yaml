tool: mxtoolbox-reverse
tags: [recon, passive, dns, m01]
exam_hint: "MXToolbox reverse lookup shows which domain names are associated with an IP address — helpful when investigating suspicious servers or shared hosting."
docs:
  - https://mxtoolbox.com/ReverseLookup.aspx

actions:
  - title: Open reverse IP lookup in browser
    desc: Opens MXToolbox to look up which domains are hosted on a given IP address. Free and no account needed. Lab targets only.
    command: "xdg-open https://mxtoolbox.com/ReverseLookup.aspx"

  - title: Run PTR reverse DNS lookup for an IP
    desc: Looks up the hostname registered for this IP address using MXToolbox SuperTool.
    command: "xdg-open https://mxtoolbox.com/SuperTool.aspx?action=ptr%3a{{ip}}"

  - title: Check both forward and reverse DNS match
    desc: Verifies that a domain's forward DNS (name to IP) and reverse DNS (IP to name) are consistent — mismatches can indicate spoofing.
    command: "xdg-open https://mxtoolbox.com/SuperTool.aspx?action=dns%3a{{domain}}"
