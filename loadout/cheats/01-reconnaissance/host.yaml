tool: host
tags: [recon, dns, m01]
exam_hint: "host is a simple DNS lookup tool — easier to read than dig for quick checks. Use it to quickly find a website's IP or mail servers."
docs:
  - "man:host"

actions:
  - title: Find a website IP address
    desc: Converts a domain name to its IP address in plain, readable output. Good for a quick check before deeper scanning.
    command: "host {{domain}}"

  - title: Find hostname from an IP address
    desc: Reverse DNS lookup — given an IP, tells you what hostname is associated with it.
    command: "host {{ip}}"

  - title: Find the mail servers
    desc: Shows MX records — which servers receive email for this domain. Important for email-related reconnaissance.
    command: "host -t mx {{domain}}"

  - title: Find the name servers
    desc: Lists the authoritative DNS servers for this domain. Needed before zone transfer attempts.
    command: "host -t ns {{domain}}"

  - title: Read TXT records
    desc: Shows TXT records — often contain SPF email rules, DKIM keys, or domain verification strings.
    command: "host -t txt {{domain}}"

  - title: Ask a specific DNS server
    desc: Sends the query to a particular DNS server instead of your default — useful for comparing results.
    command: "host {{domain}} {{ip}}"
