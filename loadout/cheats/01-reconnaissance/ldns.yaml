tool: ldns
tags: [recon, dns, m01]
exam_hint: "LDNS tools (drill and ldns-walk) are advanced DNS utilities. drill works like dig; ldns-walk can list every record in a DNSSEC-signed zone."
docs:
  - https://www.nlnetlabs.nl/projects/ldns/

actions:
  - title: Look up a domain IP address with drill
    desc: drill is a dig alternative — queries A records to find the IP address for a domain. Output is clean and easy to read.
    command: "drill {{domain}} A"

  - title: Find mail servers with drill
    desc: Queries MX records to see which servers handle email for this domain.
    command: "drill {{domain}} MX"

  - title: Find name servers with drill
    desc: Lists the authoritative DNS servers for this domain.
    command: "drill {{domain}} NS"

  - title: Try a zone transfer with drill
    desc: Attempts to download the entire DNS zone from a specific name server. Only works if misconfigured. Lab only.
    command: "drill -T {{domain}} @{{ip}}"

  - title: Trace the DNS resolution path
    desc: Shows every DNS server involved in resolving this domain, from root to the final answer.
    command: "drill -T {{domain}}"

  - title: Walk a DNSSEC zone for all records
    desc: If the zone uses DNSSEC, walks through every DNS record in the zone — can reveal hidden subdomains. Lab only.
    command: "ldns-walk {{domain}}"

  - title: Check if DNSSEC is enabled
    desc: Queries DNSKEY records to see if the domain has DNSSEC signing enabled — important for security assessment.
    command: "drill -D {{domain}}"
