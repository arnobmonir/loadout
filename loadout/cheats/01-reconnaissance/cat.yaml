tool: cat
tags: [recon, linux, m01]
exam_hint: "cat displays the contents of a file in your terminal. During reconnaissance, use it to read config files, logs, and downloaded documents — and cat -A reveals hidden characters."
docs:
  - "man:cat"

actions:
  - title: Read a file and show its contents
    desc: Displays the entire contents of a file in your terminal. Use this to read config files, logs, or any text file you found during recon.
    command: "cat {{file|/etc/hosts}}"

  - title: Reveal hidden characters in a file
    desc: Shows tabs, line endings, and invisible characters that normal cat hides. Use this to spot hidden data or tampered config files.
    command: "cat -A {{file|suspicious.txt}}"

  - title: Show file contents with line numbers
    desc: Displays the file with line numbers on the left — makes it easier to reference specific lines in your notes or report.
    command: "cat -n {{file|config.txt}}"

  - title: Read multiple files one after another
    desc: Shows the contents of several files joined together — useful for comparing configs or reading a split log file.
    command: "cat {{file|file1.txt}} {{file|file2.txt}}"

  - title: Search a log file for failed login attempts
    desc: Reads the authentication log and filters for failed login attempts — reveals brute-force attacks or unauthorized access attempts.
    command: "cat /var/log/auth.log | grep Failed"

  - title: Save text into a new file
    desc: Creates a new file with the text you type. Press Ctrl+D when done. Useful for quickly saving recon notes from the terminal.
    command: "cat > {{output|notes.txt}}"
