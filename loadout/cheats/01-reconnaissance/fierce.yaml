tool: fierce
tags: [recon, dns, m01]
exam_hint: "Fierce scans a domain for subdomains and then explores the IP addresses around each found server — useful for finding hidden hosts on the same network block."
docs:
  - https://github.com/mschwager/fierce

actions:
  - title: Scan a domain for subdomains
    desc: Automatically discovers subdomains and nearby IP addresses for a target domain. Good starting point for DNS reconnaissance. Lab targets only.
    command: "fierce --domain {{domain}}"

  - title: Check specific subdomain names
    desc: Tests only the subdomain names you specify (like admin, mail, www) instead of a full wordlist. Faster and quieter.
    command: "fierce --domain {{domain}} --subdomains admin mail www"

  - title: Explore IPs around found servers
    desc: After finding a subdomain, scans the surrounding IP addresses (up to 10 neighbors) to find other hosts on the same network block.
    command: "fierce --domain {{domain}} --subdomains mail --traverse 10"

  - title: Try to connect to found hosts
    desc: Not only finds hosts but actively tries to connect to them on common ports. More aggressive — lab only.
    command: "fierce --domain {{domain}} --subdomains mail --connect"

  - title: Scan the entire surrounding IP range
    desc: Wide mode — scans all neighboring IP space around discovered hosts. Very thorough but noisy and easy to detect. Lab only.
    command: "fierce --domain {{domain}} --wide"

  - title: Use a custom DNS server
    desc: Sends all DNS queries through a specific name server instead of the default. Useful when testing internal DNS.
    command: "fierce --domain {{domain}} --dns-servers {{ip}}"
