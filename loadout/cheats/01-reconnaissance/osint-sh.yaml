tool: osint-sh
tags: [recon, osint, m01]
exam_hint: "A simple shell-script pipeline that chains together basic recon commands — whois, DNS, and mail server lookup — in one shot for quick domain profiling."
docs:
  - https://osintframework.com

actions:
  - title: Quick domain profile in one command
    desc: Runs whois, DNS, and mail server lookup together and prints all results. Good for a fast first look at any domain. Lab targets only.
    command: "whois {{domain}}; dig {{domain}} ANY +short; host -t mx {{domain}}"

  - title: Save full recon output to a file
    desc: Runs whois and full DNS lookup and saves everything to a text file for your investigation notes.
    command: "{ whois {{domain}}; dig {{domain}} ANY; host -t mx {{domain}}; } > {{output|osint-recon.txt}}"

  - title: Check name servers and try zone transfer
    desc: Finds the name servers for a domain and immediately attempts a zone transfer against each one. Lab only.
    command: "for ns in $(dig {{domain}} NS +short); do echo \"Trying $ns\"; dig axfr {{domain}} @$ns; done"
