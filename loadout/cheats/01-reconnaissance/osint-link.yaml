tool: osint-link
tags: [recon, osint, m01]
exam_hint: "A curated bookmark list of the most useful OSINT websites — breach checkers, username searchers, email verifiers, and reverse image tools all in one place."
docs:
  - https://osintframework.com

actions:
  - title: Check if an email was in a data breach
    desc: Opens Have I Been Pwned to check if an email address appeared in any known data breaches. Does not reveal the password — just whether the email was exposed.
    command: "xdg-open https://haveibeenpwned.com/account/{{email|target@example.com}}"

  - title: Check a username across all social platforms
    desc: Opens namechk.com to see if a username is registered on Twitter, Instagram, GitHub, and dozens of other sites.
    command: "xdg-open https://namechk.com/"

  - title: Verify if an email address is real
    desc: Checks if an email address is deliverable (actually exists) without sending an email to it.
    command: "curl -s https://trumail.io/api/v1/lookups/{{email|target@example.com}}"

  - title: Search for a person across social media
    desc: Opens usersearch.org to find social media profiles, forum accounts, and public records for a person's name or username.
    command: "xdg-open https://usersearch.org/"

  - title: Reverse image search
    desc: Opens Google reverse image search to find where else an image appears online — useful for verifying profile photos or finding image sources.
    command: "xdg-open https://images.google.com/"

  - title: Check if a password has been leaked
    desc: Opens Have I Been Pwned password check — enter a password to see if it appeared in any breach (without revealing your password to anyone).
    command: "xdg-open https://haveibeenpwned.com/Passwords"
