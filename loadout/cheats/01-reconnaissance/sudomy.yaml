tool: sudomy
tags: [recon, dns, m01]
exam_hint: "Sudomy searches over 30 public sources for subdomains, then can check which ones are live and even take screenshots of their web pages."
docs:
  - https://github.com/screetsec/Sudomy

actions:
  - title: Find subdomains from public sources
    desc: Queries 30+ passive sources (certificate logs, DNS databases, search engines) for subdomains. No direct target contact. Lab targets only.
    command: "sudomy -d {{domain}}"

  - title: Find subdomains and check which are live
    desc: Discovers subdomains then probes each one with httpx to see which are actually running web services right now.
    command: "sudomy -d {{domain}} --httpx"

  - title: Save all results to a folder
    desc: Writes subdomains, live hosts, and screenshots to an output directory for your report.
    command: "sudomy -d {{domain}} -o {{output|sudomy-results}}"

  - title: Use only Shodan and Certspotter
    desc: Limits the search to Shodan and Certspotter sources only — faster when you want targeted results.
    command: "sudomy -d {{domain}} --source shodan,certspotter"

  - title: Take screenshots of live pages
    desc: Finds live web hosts and captures screenshots of each page — great for visual reconnaissance reports.
    command: "sudomy -d {{domain}} --httpx --screenshot"
