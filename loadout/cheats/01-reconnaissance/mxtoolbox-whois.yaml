tool: mxtoolbox-whois
tags: [recon, passive, whois, m01]
exam_hint: "MXToolbox WHOIS shows domain registration details plus DNS and email health checks in one place — great for checking if a domain's mail setup is correct."
docs:
  - https://mxtoolbox.com/whois.aspx

actions:
  - title: Look up who owns a domain
    desc: Opens MXToolbox WHOIS to show registrar, creation date, expiry, and name servers for the domain. Lab targets only.
    command: "xdg-open https://mxtoolbox.com/SuperTool.aspx?action=whois%3a{{domain}}"

  - title: Check if email is configured correctly
    desc: Runs a full DNS and MX health check — shows if the domain can receive email and if SPF/DKIM are set up properly.
    command: "xdg-open https://mxtoolbox.com/SuperTool.aspx?action=dns%3a{{domain}}"

  - title: Check if the domain is on an email blacklist
    desc: Tests whether the domain or its mail servers appear on spam blacklists — important for email deliverability assessment.
    command: "xdg-open https://mxtoolbox.com/SuperTool.aspx?action=blacklist%3a{{domain}}"
