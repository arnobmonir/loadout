tool: sublist3r
tags: [recon, dns, m01]
exam_hint: "Sublist3r finds subdomains by searching Google, Yahoo, Bing, and other engines — then can optionally brute-force more names or check if they are live on common ports."
docs:
  - https://github.com/aboul3la/Sublist3r

actions:
  - title: Find subdomains from search engines
    desc: Searches Google, Yahoo, Bing, and more for subdomains of your target. Passive — no direct DNS queries to the target. Lab targets only.
    command: "sublist3r -d {{domain}}"

  - title: Save found subdomains to a file
    desc: Writes all discovered subdomain names to a text file for use in later scanning steps.
    command: "sublist3r -d {{domain}} -o {{output|sublist3r.txt}}"

  - title: Check subdomains on common web ports
    desc: Finds subdomains and then checks if they respond on ports 80, 443, and 8080 — tells you which ones are actually running web servers.
    command: "sublist3r -d {{domain}} -p 80,443,8080"

  - title: Brute-force more subdomain names
    desc: After passive search, also tries a built-in wordlist of common subdomain names via DNS brute-force. More thorough but noisier. Lab only.
    command: "sublist3r -d {{domain}} -b"

  - title: Use every search engine available
    desc: Enables all search engine sources for maximum subdomain coverage. Takes longer but finds more names.
    command: "sublist3r -d {{domain}} -e google,yahoo,bing,ask,netcraft,virustotal,threatcrowd"
