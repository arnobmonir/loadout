tool: dig
tags: [recon, dns, m01]
exam_hint: "dig is the main command-line tool for looking up DNS records. It tells you things like a website's IP address, mail servers, and name servers — without visiting the site itself."
docs:
  - "man:dig"

actions:
  - title: Find the website IP address
    desc: Turns a domain name (like example.com) into its IPv4 address. Start here when you have a website name but need the actual server IP. Lab targets only.
    command: "dig {{domain}} A +short"

  - title: Find all DNS record types
    desc: Shows every DNS record stored for the domain — A, MX, NS, TXT, and more. Good for a full picture of how the domain is set up.
    command: "dig {{domain}} ANY"

  - title: Find the mail servers
    desc: Lists MX (mail exchange) records — tells you which servers handle email for this domain. Useful for mapping email infrastructure.
    command: "dig {{domain}} MX +short"

  - title: Find the name servers
    desc: Shows which DNS servers are authoritative for this domain. You need these before attempting a zone transfer.
    command: "dig {{domain}} NS +short"

  - title: Read SPF and verification records
    desc: Shows TXT records — often used for email security (SPF, DKIM) or domain ownership verification tokens.
    command: "dig {{domain}} TXT +short"

  - title: Find IPv6 address
    desc: Looks up the AAAA record for IPv6 addresses, if the domain has one configured.
    command: "dig {{domain}} AAAA +short"

  - title: Reverse lookup — IP to hostname
    desc: Given an IP address, finds the hostname pointing back to it (PTR record). Helps identify who owns a server.
    command: "dig -x {{ip}} +short"

  - title: Query a specific DNS server
    desc: Ask a particular DNS server (like 8.8.8.8) instead of your default. Useful when results differ between resolvers.
    command: "dig @{{ip}} {{domain}} +short"

  - title: Trace the full DNS resolution path
    desc: Shows every step your query takes through the DNS hierarchy — helpful for debugging or understanding DNS setup.
    command: "dig {{domain}} +trace"

  - title: Try to copy the entire DNS zone
    desc: Attempts a zone transfer (AXFR) to download all DNS records at once. Only works if the server is misconfigured. Lab only.
    command: "dig axfr {{domain}} @{{ip}}"
