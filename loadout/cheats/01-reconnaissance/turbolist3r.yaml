tool: turbolist3r
tags: [recon, dns, m01]
exam_hint: "Turbolist3r is a faster version of Sublist3r. It uses multiple threads to search engines and DNS simultaneously for quicker subdomain discovery."
docs:
  - https://github.com/fleetcaptain/Turbolist3r

actions:
  - title: Fast passive subdomain search
    desc: Searches multiple sources in parallel to find subdomains quickly. Good when you need results fast. Lab targets only.
    command: "python3 turbolist3r.py -d {{domain}}"

  - title: Save results to a file
    desc: Finds subdomains and writes them to a text file for your records or next scanning step.
    command: "python3 turbolist3r.py -d {{domain}} -o {{output|turbolist3r.txt}}"

  - title: Brute-force subdomains with a wordlist
    desc: Combines passive search with DNS brute-force using your own wordlist. Finds hidden dev and staging servers. Lab only.
    command: "python3 turbolist3r.py -d {{domain}} -b -w {{wordlist|/usr/share/wordlists/dnsmap.txt}}"

  - title: Use more threads for speed
    desc: Runs with 40 parallel threads for faster results on large targets. Uses more CPU and network bandwidth.
    command: "python3 turbolist3r.py -d {{domain}} -t 40"
