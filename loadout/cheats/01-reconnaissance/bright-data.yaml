tool: bright-data
tags: [recon, osint, m01]
exam_hint: "Bright Data provides proxy servers that route your OSINT scraping through different countries and IP addresses — so websites cannot block or trace your real location."
docs:
  - https://brightdata.com/products/proxy-api

actions:
  - title: Fetch a webpage through a proxy
    desc: Downloads a webpage through Bright Data's proxy network so the target sees a different IP address. Requires a Bright Data account and API key. Lab only.
    command: "curl -x http://USER:PASS@brd.superproxy.io:22225 -sL https://{{domain}}"

  - title: Open Bright Data documentation
    desc: Opens the Bright Data proxy API documentation to set up your account and get connection credentials.
    command: "xdg-open https://brightdata.com/products/proxy-api"
