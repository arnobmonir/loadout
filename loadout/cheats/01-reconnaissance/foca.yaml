tool: foca
tags: [recon, metadata, m01]
exam_hint: "FOCA extracts hidden metadata from public documents (Word, Excel, PDF) — revealing usernames, printer names, software versions, and internal paths left behind by the author."
docs:
  - https://www.elevenpaths.com/labstools/foca

actions:
  - title: FOCA workflow reminder
    desc: FOCA is a Windows GUI tool. Search for public documents belonging to the target domain, download them, and extract metadata to find usernames and internal paths. Lab targets only.
    command: "echo 'FOCA workflow: 1) Search {{domain}} for public Office/PDF files  2) Download documents  3) Extract metadata  4) Review usernames, paths, printers'"

  - title: Extract metadata from a downloaded document
    desc: Uses exiftool (command-line alternative to FOCA) to extract all metadata from a downloaded PDF or Office document.
    command: "exiftool {{file|document.pdf}}"

  - title: Extract metadata from all files in a folder
    desc: Runs exiftool on every file in a directory — useful after downloading multiple public documents from the target.
    command: "exiftool -r {{path|./documents/}}"

  - title: Show only author and software fields
    desc: Extracts just the author name and software version from a document — the most useful fields for identifying internal usernames.
    command: "exiftool -Author -Creator -Software {{file|document.pdf}}"
