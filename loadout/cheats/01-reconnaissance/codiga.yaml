tool: codiga
tags: [recon, sast, m01]
exam_hint: "Codiga scans source code for security mistakes — hardcoded passwords, SQL injection patterns, and insecure functions — useful when reviewing a target's public code repositories."
docs:
  - https://www.codiga.io/

actions:
  - title: Scan a project for security issues
    desc: Runs Codiga static analysis on a code directory to find insecure coding patterns, hardcoded secrets, and common vulnerabilities. Lab targets only.
    command: "codiga analyze --path {{path|./project}}"

  - title: Save scan results as JSON
    desc: Runs the analysis and exports findings as a JSON file — easy to import into reports or other security tools.
    command: "codiga analyze --path {{path|./project}} --format json > {{output|codiga-report.json}}"
