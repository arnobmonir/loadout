tool: shodan
tags: [recon, osint, m01]
exam_hint: "Shodan is like Google but for internet-connected devices. It shows what services, ports, and software versions are exposed on any IP address worldwide — cameras, servers, routers, and more."
docs:
  - https://www.shodan.io

actions:
  - title: Find all devices owned by a company
    desc: Searches Shodan for every internet-connected device registered to an organization. Shows IPs, open ports, and software versions. Lab targets only.
    command: "xdg-open https://www.shodan.io/search?query=org%3A%22{{domain}}%22"

  - title: Look up everything about one IP address
    desc: Opens the Shodan page for a specific IP — shows every open port, service banner, SSL certificate, and vulnerability found on that host.
    command: "xdg-open https://www.shodan.io/host/{{ip}}"

  - title: Find devices with a specific port open
    desc: Searches for all hosts in a country or organization that have a specific port open (like port 22 for SSH or 3389 for RDP).
    command: "xdg-open https://www.shodan.io/search?query=hostname%3A{{domain}}+port%3A443"

  - title: Find devices with a known vulnerability
    desc: Searches Shodan for devices affected by a specific CVE. Replace the CVE number with the one you are investigating.
    command: "xdg-open https://www.shodan.io/search?query=vuln%3ACVE-2021-44228"

  - title: Search from the command line
    desc: Runs a Shodan search from your terminal. Requires a Shodan API key (free account available at shodan.io).
    command: "shodan search 'hostname:{{domain}}'"

  - title: Get full details on an IP from CLI
    desc: Shows all Shodan data for one IP address in your terminal — ports, banners, vulnerabilities, and location.
    command: "shodan host {{ip}}"

  - title: Count how many results match a query
    desc: Quickly shows how many devices match your search without loading the full results page.
    command: "shodan count 'org:{{domain}}'"
