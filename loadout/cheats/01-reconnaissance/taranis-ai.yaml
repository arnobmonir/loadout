tool: taranis-ai
tags: [recon, osint, m01]
exam_hint: "Taranis AI automatically collects news and RSS feeds, uses AI to extract indicators of compromise (IOCs), and generates threat intelligence reports."
docs:
  - https://github.com/taranis-ai/taranis-ai

actions:
  - title: Download Taranis AI
    desc: Clones the Taranis AI repository to your machine. It runs as a self-hosted platform for automated OSINT collection and analysis.
    command: "git clone https://github.com/taranis-ai/taranis-ai"

  - title: Deploy with Docker Compose
    desc: Prints a reminder to use the docker-compose.yml file in the repository to start all Taranis AI services.
    command: "echo 'Taranis AI: cd taranis-ai && docker compose up -d — then open http://localhost:8080'"
