tool: google-word-sniper
tags: [recon, osint, m01]
exam_hint: "Google Word Sniper helps you build precise Google search queries with the right keywords and operators to find exactly what you are looking for during OSINT investigations."
docs:
  - https://googlewordsniper.eu

actions:
  - title: Open Google Word Sniper tool
    desc: Opens the Google Word Sniper website to help you craft precise search queries with the right keywords and operators. Lab targets only.
    command: "xdg-open https://googlewordsniper.eu"

  - title: Search a domain for a specific keyword
    desc: Runs a Google search limited to the target domain for a specific word — like 'password', 'confidential', or 'internal'.
    command: "xdg-open 'https://www.google.com/search?q=site%3A{{domain}}+{{keyword|password}}'"

  - title: Find pages excluding a word
    desc: Searches the target domain but excludes results containing a specific word — narrows down large result sets.
    command: "xdg-open 'https://www.google.com/search?q=site%3A{{domain}}+{{keyword|admin}}+-login'"
