tool: wayback
tags: [recon, osint, m01]
exam_hint: "The Wayback Machine (archive.org) stores snapshots of websites from the past. Find deleted pages, old email addresses, previous site versions, and forgotten files."
docs:
  - https://web.archive.org

actions:
  - title: Browse all saved snapshots of a website
    desc: Opens the Wayback Machine calendar showing every date a snapshot of the target website was saved. Click any date to see the old version. Lab targets only.
    command: "xdg-open https://web.archive.org/web/*/https://{{domain}}"

  - title: Get a list of all archived URLs as JSON
    desc: Queries the Wayback CDX API to get every URL ever archived for this domain — returns JSON you can search and filter.
    command: "curl -s 'https://web.archive.org/cdx/search/cdx?url={{domain}}&output=json'"

  - title: Download the most recent archived page
    desc: Fetches the latest saved snapshot of the target website and saves it as an HTML file for offline review.
    command: "curl -sL 'https://web.archive.org/web/{{domain}}' -o {{output|wayback.html}}"

  - title: Find archived pages from a specific year
    desc: Opens Wayback Machine filtered to snapshots from a specific year — useful for finding old contact info or removed content.
    command: "xdg-open https://web.archive.org/web/20200101000000*/https://{{domain}}"

  - title: Search the full archive for a keyword
    desc: Searches all of archive.org for pages containing a specific keyword related to your target.
    command: "curl -s 'https://archive.org/advancedsearch.php?q={{keyword|example}}&output=json'"
