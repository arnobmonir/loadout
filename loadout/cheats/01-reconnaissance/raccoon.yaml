tool: raccoon
tags: [recon, osint, m01]
exam_hint: "Raccoon is an all-in-one recon tool. Give it a domain and it automatically runs DNS lookups, WHOIS, subdomain search, port scans, and WAF detection in one command."
docs:
  - https://github.com/evyatarmeged/Raccoon

actions:
  - title: Run full recon on a domain
    desc: Automatically performs DNS, WHOIS, subdomain discovery, port scanning, and technology detection — all in one command. Lab targets only.
    command: "raccoon {{domain}}"

  - title: Save all results to a folder
    desc: Runs full recon and saves every finding (DNS, ports, emails, etc.) to an organized output directory.
    command: "raccoon {{domain}} --outdir {{output|results}}"

  - title: Skip DNS brute-forcing
    desc: Runs recon but skips the subdomain brute-force step — quieter and faster, uses only passive sources.
    command: "raccoon {{domain}} --skip-dns-brute"

  - title: Hide your IP using Tor
    desc: Routes all traffic through the Tor network so the target cannot see your real IP address. Slower but more private.
    command: "raccoon {{domain}} --tor-routing"

  - title: Scan only specific ports
    desc: Limits port scanning to the ports you specify instead of the default common port list.
    command: "raccoon {{domain}} --ports 80,443,8080,8443"
