tool: orb
tags: [recon, passive, m01]
exam_hint: "Orb passively maps everything publicly known about a company — subdomains, IP ranges, and certificates — without sending a single packet to the target."
docs:
  - https://github.com/reewardius/Orb

actions:
  - title: Map all public assets for a domain
    desc: Searches certificate transparency logs and passive DNS databases to find every subdomain and IP associated with the target. Completely silent. Lab targets only.
    command: "orb -d {{domain}}"

  - title: Save results as JSON
    desc: Exports all discovered assets (subdomains, IPs, ASNs) to a JSON file for use in other tools or reports.
    command: "orb -d {{domain}} -o {{output|orb.json}}"

  - title: Show detailed progress while scanning
    desc: Runs the passive scan with verbose output so you can see each source being queried and what it finds.
    command: "orb -d {{domain}} -v"
