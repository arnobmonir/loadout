tool: sysdig
tags: [recon, monitoring, m01]
exam_hint: "Sysdig captures everything happening on a Linux system in real time — every process, file access, and network connection — useful for understanding what a server is actually doing."
docs:
  - https://docs.sysdig.com/

actions:
  - title: Capture 10 seconds of system activity
    desc: Records every system call (process starts, file opens, network connections) for 10 seconds. Good for a quick snapshot of what a server is doing. Authorized lab hosts only.
    command: "sudo sysdig -M 10"

  - title: Watch only one application's activity
    desc: Filters the capture to show only events from a specific process — like nginx or apache — to focus on web server behavior.
    command: "sudo sysdig proc.name={{process|nginx}}"

  - title: Save a capture to a file for later analysis
    desc: Records system activity and saves it to a .scap file you can analyze later with sysdig or transfer to another machine.
    command: "sudo sysdig -w {{output|sysdig-capture.scap}}"

  - title: Show all running containers
    desc: Lists every Docker container currently running on the system — useful for mapping containerized services during recon.
    command: "sudo sysdig -c containers"
