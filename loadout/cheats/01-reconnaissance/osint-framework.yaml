tool: osint-framework
tags: [recon, osint, m01]
exam_hint: "OSINT Framework is a free directory of hundreds of OSINT tools organized by what you are looking for — usernames, emails, domains, images, and more."
docs:
  - https://osintframework.com

actions:
  - title: Open the OSINT tool directory
    desc: Opens the OSINT Framework website — a tree of free tools organized by type of information you want to find. No account needed.
    command: "xdg-open https://osintframework.com"

  - title: Browse domain investigation tools
    desc: Opens the domain/username section of OSINT Framework — lists tools for WHOIS, DNS, subdomain search, and more.
    command: "xdg-open https://osintframework.com/#!/search/domain"

  - title: Browse email investigation tools
    desc: Opens tools for email verification, breach checking, and email-to-person lookup.
    command: "xdg-open https://osintframework.com/#!/search/email"

  - title: Browse social media investigation tools
    desc: Opens tools for searching usernames, social profiles, and social media posts across platforms.
    command: "xdg-open https://osintframework.com/#!/search/username"
