tool: gcp_service_enum
tags: [recon, cloud, m01]
exam_hint: "gcp_service_enum looks for publicly accessible Google Cloud Platform services — storage buckets, Firebase apps, and cloud functions tied to your target."
docs:
  - https://cloud.google.com/security

actions:
  - title: Search GCP by company keyword
    desc: Tries common GCP naming patterns for a company name to find public storage buckets and services. Lab targets only.
    command: "gcp_service_enum -k {{keyword|examplecorp}}"

  - title: Search GCP by domain name
    desc: Uses the target domain to find associated GCP projects, buckets, and cloud services.
    command: "gcp_service_enum -d {{domain}}"

  - title: Save findings to a file
    desc: Writes all discovered GCP resources to a text file for review and reporting.
    command: "gcp_service_enum -d {{domain}} -o {{output|gcp-enum.txt}}"
