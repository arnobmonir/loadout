tool: verisign-whois
tags: [recon, passive, whois, m01]
exam_hint: "Verisign runs the .com and .net registries. Their WHOIS portal gives authoritative registration data straight from the source — good for cross-checking CLI whois results."
docs:
  - https://www.verisign.com/en_US/domain-names/whois/

actions:
  - title: Open Verisign WHOIS portal
    desc: Opens the official Verisign WHOIS search page for .com and .net domains. Enter your target domain in the search box. Lab targets only.
    command: "xdg-open https://www.verisign.com/en_US/domain-names/whois/index.xhtml"

  - title: Cross-check with CLI whois
    desc: Runs CLI whois and saves the output so you can compare it against the Verisign portal results.
    command: "whois {{domain}} | tee {{output|whois-verisign.txt}}"
