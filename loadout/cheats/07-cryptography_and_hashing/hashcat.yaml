tool: hashcat
tags:
- post
- crypto
- cracking
- m08
- m07
- hash
exam_hint: 'GPU-accelerated hash cracker — NTLM, bcrypt, WPA, etc. Hashcat is a powerful password recovery and hash cracking tool supporting a wide range of algorithms and attack modes, widely used in penetration testing and digital forensics. Strategy: Identify hash'
docs:
- https://hashcat.net/wiki/
actions:
- title: wordlist attack
  desc: Mode 0 dictionary attack
  command: hashcat -m {{mode|1000}} -a 0 {{output|hashes.txt}} {{wordlist}}
- title: NT hash crack
  desc: Crack NTLM (mode 1000)
  command: hashcat -m 1000 -a 0 {{output|ntlm.txt}} {{wordlist}}
- title: show cracked
  desc: Show potfile results
  command: hashcat -m {{mode|1000}} {{output|hashes.txt}} --show
- title: Identify hash type
  desc: Before cracking, confirm hash mode with hashid or hashcat example hashes.
  command: hashid {{hash|hash.txt}}
- title: Crack NTLM hashes mode 1000
  desc: Offline crack Windows NT hashes from secretsdump or mimikatz output.
  command: hashcat -m 1000 {{hashes|ntlm.txt}} {{wordlist|/usr/share/wordlists/rockyou.txt}}
- title: Crack Kerberos TGS mode 13100
  desc: Kerberoast output — run after GetUserSPNs in lab AD.
  command: hashcat -m 13100 {{hashes|tgs.txt}} {{wordlist|/usr/share/wordlists/rockyou.txt}}
- title: Show cracked passwords
  desc: Displays recovered plaintext after a hashcat session completes.
  command: hashcat -m 1000 {{hashes|ntlm.txt}} --show
- title: Hashcat -m <hash-type>
  desc: Runs `hashcat` as part of the CEH workflow. Identify hash mode (hashcat -m / john format); start targeted wordlists and rules; crack service accounts before domain admins. Authorized lab targets only.
  command: hashcat -m <hash-type> -a <attack-mode> <hashfile> <wordlist>
