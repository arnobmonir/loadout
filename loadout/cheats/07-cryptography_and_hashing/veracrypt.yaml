exam_hint: 'VeraCrypt is a free and open-source disk encryption software that evolved from TrueCrypt. It provides strong encryption for disk volumes with plausible deniability through hidden volumes. VeraCrypt can encrypt entire hard drives or create encrypted containers. Strategy: Identify hash mode (hashcat -m / john format); start targeted wordlists and rules; crack service accounts before domain admins.'
