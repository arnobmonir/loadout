exam_hint: 'GnuPG (GNU Privacy Guard) is a free and open-source implementation of the OpenPGP standard. It allows secure communication and data storage using both symmetric and public-key cryptography. GnuPG is widely used for email encryption, file encryption, and digital signing. Strategy: Identify hash mode (hashcat -m / john format); start targeted wordlists and rules; crack service accounts before domain admins.'
