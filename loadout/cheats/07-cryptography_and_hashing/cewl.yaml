exam_hint: 'CeWL (Custom Wordlist Generator) is a Ruby web application spider that extracts words and patterns from target websites to generate custom, context-specific wordlists for password attacks and brute-forcing operations. Strategy: Identify hash mode (hashcat -m / john format); start targeted wordlists and rules; crack service accounts before domain admins.'
