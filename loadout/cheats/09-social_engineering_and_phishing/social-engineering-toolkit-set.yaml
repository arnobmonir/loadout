exam_hint: 'The Social Engineering Toolkit (SET) is a Python-based framework designed for penetration testing and social engineering attacks. Developed by David Kennedy, it automates many of the social engineering attack methods used in real-world penetration tests, including phishing campaigns, credential harvesting, and payload delivery mechanisms. Strategy: Scope recipient lists and landing pages; use isolated infra; track opens/clicks only within written authorization.'
