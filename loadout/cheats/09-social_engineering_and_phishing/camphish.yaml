exam_hint: 'CamPhish is a phishing framework specifically designed to trick users into enabling their webcam access. It uses a deceptive page that mimics legitimate services and prompts users to allow camera permissions, allowing attackers to secretly access webcam feeds. Strategy: Scope recipient lists and landing pages; use isolated infra; track opens/clicks only within written authorization.'
