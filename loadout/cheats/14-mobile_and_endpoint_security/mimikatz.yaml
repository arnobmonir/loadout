tool: mimikatz
tags:
- m14
- mobile
- endpoint
exam_hint: 'Mimikatz is a Windows utility that extracts plaintext passwords, hashes, PIN codes, and Kerberos tickets from memory. Developed by Benjamin Delpy, it''s one of the most critical post-exploitation tools in penetration testing, allowing attackers to escalate privileges, move laterally, and maintain persistence within active directory environments. Strategy: Static APK/IPA analysis before dynamic; use emulators with no prod accounts; endpoint tools only on owned lab devices.'
docs:
- https://github.com/gentilkiwi/mimikatz
- https://github.com/gentilkiwi/mimikatz/wiki
- https://attack.mitre.org/software/S0002/
