tool: appium
tags:
- m14
- mobile
- endpoint
exam_hint: 'Appium is an open-source test automation framework for mobile apps. It allows testers to write automated tests for Android and iOS applications using standard protocols. Appium is useful for security testing of mobile applications, identifying vulnerabilities through automated interaction testing. Strategy: Static APK/IPA analysis before dynamic; use emulators with no prod accounts; endpoint tools only on owned lab devices.'
docs:
- http://localhost:4723/wd/hub
- http://appium.io/
- http://appium.io/docs/
