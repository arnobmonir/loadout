tool: drozer
tags:
- mobile
- android
- m14
- endpoint
exam_hint: Android security assessment — IPC, content providers, and attack surface mapping drozer is a comprehensive security and attack framework for Android applications. It provides tools and techniques for assessing the security of Android apps and the Android platform itself, including
docs:
- https://github.com/WithSecureLabs/drozer
actions:
- title: connect agent
  desc: Connect drozer console to agent on device
  command: drozer console connect --server {{ip}}
- title: list packages
  desc: Enumerate installed packages on connected agent
  command: drozer console connect -c 'run app.package.list'
- title: Apt-get install drozer
  desc: Runs `apt-get` as part of the CEH workflow. Static APK/IPA analysis before dynamic; use emulators with no prod accounts; endpoint tools only on owned lab devices.
  command: apt-get install drozer
- title: Pip install drozer
  desc: Runs `pip` as part of the CEH workflow. Static APK/IPA analysis before dynamic; use emulators with no prod accounts; endpoint tools only on owned lab devices.
  command: pip install drozer
- title: Drozer console connect
  desc: Runs `drozer` as part of the CEH workflow. Static APK/IPA analysis before dynamic; use emulators with no prod accounts; endpoint tools only on owned lab devices.
  command: drozer console connect
