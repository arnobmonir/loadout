tool: adb
tags: [mobile, android, m14]
exam_hint: "Android Debug Bridge — device shell, package enum, and file pull on lab devices"
docs:
  - https://developer.android.com/tools/adb

actions:
  - title: list devices
    desc: Show connected emulators and USB devices
    command: "adb devices -l"

  - title: connect remote
    desc: Connect to Android device over TCP (authorized lab device)
    command: "adb connect {{ip}}:{{port|5555}}"

  - title: shell
    desc: Open interactive adb shell on default device
    command: "adb shell"
