exam_hint: 'FileSeek (by Binary Fortress Software) is a fast Windows file search tool that can search file names, file contents, and metadata using text or regular expression patterns. During malware analysis and forensic investigation, FileSeek is used to quickly locate malware-dropped files (by searching for unusual file names, extensions, or content patterns), find configuration files containing C2 address Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
