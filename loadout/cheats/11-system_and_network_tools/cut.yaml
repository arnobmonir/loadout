exam_hint: 'cut is a command-line utility for extracting columns or fields from text lines. It selects specific portions of each input line, either by character position, byte position, or delimited field. cut is essential for processing structured text data like CSV files, logs, and configuration files. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
