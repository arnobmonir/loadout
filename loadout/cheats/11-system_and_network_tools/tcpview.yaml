tool: tcpview
tags:
- m11
- network
- cli
exam_hint: 'TCPView is a Sysinternals (Microsoft) utility for Windows that provides a real-time view of all active TCP and UDP endpoints, including remote addresses, ports, connection state, and the owning process. During malware analysis, it is used to detect C2 beaconing (periodic outbound connections), unexpected listening ports opened by malware, and lateral movement connection attempts. It is a lightweig Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
- https://docs.microsoft.com/en-us/sysinternals/downloads/tcpview
- https://docs.microsoft.com/en-us/sysinternals/
