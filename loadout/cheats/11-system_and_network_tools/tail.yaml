exam_hint: 'tail is a command-line utility that displays the end portion of files. Primarily used for viewing the last N lines or monitoring files as they grow. Essential for log file analysis, real-time monitoring, and troubleshooting system issues. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
