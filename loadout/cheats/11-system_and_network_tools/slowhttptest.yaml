tool: slowhttptest
tags:
- m11
- network
- cli
exam_hint: 'Slowhttptest is a comprehensive slow-rate HTTP attack simulator that tests web application vulnerability to slow-rate denial-of-service attacks. It implements multiple slow-rate attack vectors including Slowloris (slow request header), Slow Read (slow body transmission), Slow POST (slow request body), and client disconnect attacks. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
docs:
- https://github.com/shekyan/slowhttptest.git
- http://target.com
