exam_hint: 'nltest (Network Location Test) is a Windows command-line diagnostic utility for testing Netlogon and domain controller connectivity. Attackers use it for Active Directory enumeration. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
