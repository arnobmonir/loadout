exam_hint: 'DNSQuerySniffer is a free Windows network sniffer utility from NirSoft that captures and displays all DNS queries and responses sent and received by the local system. It shows the queried hostname, DNS record type, response data, TTL, and the process that made the request. During malware analysis, it is used to detect C2 domain lookups, DGA (Domain Generation Algorithm) patterns, DNS exfiltration, Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
- https://www.nirsoft.net/utils/dns_query_sniffer.html
actions:
- title: DNSQuerySniffer.exe /scsv dns_results.csv
  desc: Runs `DNSQuerySniffer.exe` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: DNSQuerySniffer.exe /scsv dns_results.csv
