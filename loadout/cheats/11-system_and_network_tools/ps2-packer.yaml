tool: ps2-packer
tags:
- m11
- network
- cli
exam_hint: 'ps2-packer is a tool for packing and compressing PlayStation 2 (PS2) binaries, often used in reverse engineering and malware analysis to study obfuscated or packed code. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
docs:
