tool: quick-startup
tags:
- m11
- network
- cli
exam_hint: 'Quick Startup is a Windows startup management tool that lists and controls all programs, services, and tasks that launch when Windows starts. It covers registry Run keys, startup folders, scheduled tasks, services, and browser extensions. The tool helps analysts identify malware persistence by showing all autostart entries with their file paths, allowing quick identification of suspicious entries  Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
- https://docs.microsoft.com/en-us/sysinternals/downloads/autoruns
- https://attack.mitre.org/techniques/T1547/
