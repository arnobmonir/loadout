tool: pslist
tags:
- m11
- network
- cli
exam_hint: 'PsList is a Sysinternals command-line utility that lists running processes on local and remote Windows systems with detailed information including PIDs, parent processes, CPU usage, memory allocation, and process priority, essential for reconnaissance and lateral movement planning. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
