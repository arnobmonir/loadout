tool: net-view
tags:
- m11
- network
- cli
exam_hint: 'net view is a built-in Windows command that lists shared resources (shares, printers) available on a remote computer or all computers in a workgroup/domain. It uses NetBIOS/SMB to query the target, making it a quick native tool for enumerating shared resources without installing additional software. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
