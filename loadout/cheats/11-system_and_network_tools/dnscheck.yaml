exam_hint: 'DNSCheck.co (formerly by Zonemaster or IIS.se tools) is an online DNS analysis and health checking tool that tests the configuration and integrity of a domain''s DNS setup. It validates DNS records (A, MX, NS, SOA, TXT, DKIM, SPF, DMARC), checks DNSSEC configuration, detects common DNS misconfigurations, and verifies that DNS propagation is correct. From a security perspective, it is used to audit  Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
