exam_hint: 'RegScanner is a free Windows registry search utility from NirSoft that allows analysts to perform advanced searches across the entire Windows Registry, saving results for offline review and comparison. Unlike the built-in Registry Editor (regedit) which finds only the first match, RegScanner displays all matches simultaneously and supports regex patterns, value data types, and date-range filtering Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
