exam_hint: 'Tripwire is a file and directory integrity checker that creates a baseline snapshot of the system and alerts when unauthorized changes are detected. Foundational host-based IDS tool. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
