tool: filezilla
tags:
- m11
- network
- cli
exam_hint: 'FileZilla is a free, open-source FTP, SFTP, and FTPS client used for secure file transfer between systems. In penetration testing, FileZilla serves multiple purposes: testing FTP/SFTP vulnerabilities, transferring files during post-exploitation, configuring exfiltration channels, and testing authentication mechanisms across file transfer protocols. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
