tool: xxd
tags:
- m11
- network
- cli
exam_hint: 'xxd creates hexadecimal dumps with ASCII representation side-by-side, and can reverse hex dumps back to binary. Superior to od for visual inspection, supporting both display and manipulation of binary files. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
docs:
- http://example.com/data.hex
