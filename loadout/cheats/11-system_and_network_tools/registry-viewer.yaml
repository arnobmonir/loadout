exam_hint: 'Registry Viewer (by AccessData/Exterro) is a forensic tool for analysing Windows Registry hive files offline—that is, viewing .dat registry hive files (NTUSER.DAT, SOFTWARE, SYSTEM, SAM, SECURITY) extracted from a target system or forensic image without needing to mount them in the live OS. This is essential in forensic investigations where analysts work from disk images and need to inspect the re Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
