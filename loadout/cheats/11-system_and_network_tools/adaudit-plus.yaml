actions:
- title: Get-WinEvent -FilterHashtable @{LogName='Security';
  desc: Runs `Get-WinEvent` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4624} | Select -First 20
- title: Get-WinEvent -FilterHashtable @{LogName='Security'; (2)
  desc: Runs `Get-WinEvent` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
