tool: curl
tags:
- network
- web
- m11
- cli
exam_hint: HTTP client — headers, methods, file transfer, API testing curl is a versatile command-line tool for transferring data using URLs. Supporting HTTP, HTTPS, FTP, FTPS, SCP, SFTP, TELNET, LDAP, and other protocols, curl is essential for API testing, web requests
docs:
- man:curl
actions:
- title: GET request
  desc: Fetch URL with response headers
  command: curl -i http://{{ip}}/
- title: POST JSON
  desc: POST JSON body to endpoint
  command: 'curl -X POST http://{{ip}}/api -H ''Content-Type: application/json'' -d ''{"user":"{{user}}"}'''
- title: download file
  desc: Download file to disk
  command: curl -o {{output|file.bin}} http://{{ip}}/file
- title: custom headers
  desc: Request with custom Host header
  command: 'curl -H ''Host: {{domain}}'' http://{{ip}}/'
- title: Fetch URL with response headers
  desc: Quick HTTP check — see status code, server header, and cookies.
  command: curl -i {{target|http://192.168.1.10/}}
- title: POST JSON to API endpoint
  desc: Send lab API requests during web or cloud testing.
  command: 'curl -X POST {{target|http://192.168.1.10/api}} -H ''Content-Type: application/json'' -d ''{"key":"value"}'''
- title: Download file to disk
  desc: Stage tools or exfil test files on authorized lab hosts.
  command: curl -o {{output|file.bin}} {{target|http://192.168.1.10/file.bin}}
- title: Apt-get update
  desc: Runs `sudo` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
