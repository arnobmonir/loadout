exam_hint: 'CurrPorts is a free Windows utility from NirSoft that displays a real-time list of all open TCP/IP and UDP ports along with the processes that opened them, remote addresses, and connection state. Similar to TCPView, it is used during dynamic malware analysis to monitor network connections established by suspicious processes. CurrPorts supports column-based filtering, auto-refresh, and can export r Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
