tool: ntp-amplification-attack
tags:
- m11
- network
- cli
exam_hint: 'NTP Amplification Attack is a layer-4 denial-of-service attack that exploits Network Time Protocol (NTP) servers with poor access controls. Attackers send spoofed NTP requests (especially monlist command) to public NTP servers, receiving large responses directed at the target victim. NTP provides one of the highest amplification factors among reflection-based DDoS attacks. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limi'
