exam_hint: 'netstat (network statistics) is a command-line utility for displaying network connections, routing tables, interface statistics, and socket information. Essential for network troubleshooting, security auditing, and monitoring active connections. Shows protocol statistics and port listening information. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
