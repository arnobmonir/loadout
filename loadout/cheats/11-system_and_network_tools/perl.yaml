exam_hint: 'Perl (Practical Extraction and Report Language) is a high-level, interpreted scripting language widely used in network security and system administration. In CEH contexts, Perl is referenced as a scripting tool for writing custom network probes, IDS evasion scripts, port scanners, and exploit automation due to its powerful text processing and socket libraries. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
