actions:
- title: Sc query type=
  desc: Runs `sc` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: sc query type= all state= all | findstr /i "SERVICE_NAME"
- title: Get-WmiObject Win32_Service
  desc: Runs `Get-WmiObject` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: Get-WmiObject Win32_Service | Select Name, PathName, State, StartMode | Format-Table -AutoSize
- title: Get-WmiObject Win32_Service (2)
  desc: Runs `Get-WmiObject` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: Get-WmiObject Win32_Service | Where {$_.PathName -like "*Temp*" -or $_.PathName -like "*AppData*"}
- title: Sc stop SuspiciousService
  desc: Runs `sc` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
