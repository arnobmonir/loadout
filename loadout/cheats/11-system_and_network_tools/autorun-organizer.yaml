exam_hint: 'Autorun Organizer is a Windows startup management utility that displays and manages all programs configured to run automatically when Windows starts. It covers registry Run keys, startup folders, scheduled tasks, services, browser extensions, and other autostart locations. Security analysts use autorun management tools to detect malware persistence mechanisms, as virtually all Windows malware esta Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
