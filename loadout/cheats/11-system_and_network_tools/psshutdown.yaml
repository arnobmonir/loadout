tool: psshutdown
tags:
- m11
- network
- cli
exam_hint: 'PsShutdown is a command-line utility from Sysinternals'' PsTools suite that enables remote shutdown, restart, logoff, suspend, and hibernate of local or remote Windows systems without requiring Terminal Services. In CEH contexts it is referenced as part of the PsTools enumeration and remote administration toolkit. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
