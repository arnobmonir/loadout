exam_hint: 'Regshot is a free, open-source Windows utility that captures and compares two snapshots of the Windows Registry (and optionally the file system). By taking a "1st shot" before executing a malware sample and a "2nd shot" after, analysts can see exactly which registry keys and values were added, modified, or deleted by the malware. This makes Regshot one of the most effective tools for determining m Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
