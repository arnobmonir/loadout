tool: psgetsid
tags:
- m11
- network
- cli
exam_hint: 'PsGetSid is a Sysinternals command-line tool that translates Security Identifiers (SIDs) to user names and vice versa. Essential for privilege escalation research, lateral movement planning, and understanding Windows security contexts on local and remote systems. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
