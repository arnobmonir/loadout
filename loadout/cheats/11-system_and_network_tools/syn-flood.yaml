tool: syn-flood
tags:
- m11
- network
- cli
exam_hint: 'SYN Flood is a network-layer denial-of-service attack that exploits the TCP three-way handshake mechanism. The attacker sends large volumes of TCP SYN packets with spoofed source IP addresses, causing the target server to allocate resources for half-open connections that are never completed, exhausting server capacity and preventing legitimate connections. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
