tool: udp-flood
tags:
- m11
- network
- cli
exam_hint: 'UDP Flood is a volumetric denial-of-service attack that sends massive quantities of User Datagram Protocol (UDP) packets to the target host or network. Unlike amplification-based attacks, UDP floods rely on raw volume to consume bandwidth and exhaust resources. The attacker generates high-rate UDP traffic targeting a specific port, overwhelming the target''s ability to process incoming packets. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pi'
