tool: wireshark
tags:
- m11
- network
- cli
exam_hint: 'Wireshark is a free and open-source packet analyzer used for network troubleshooting, analysis, software and protocol development, and education. It allows users to capture and interactively browse the traffic running on a computer network. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
