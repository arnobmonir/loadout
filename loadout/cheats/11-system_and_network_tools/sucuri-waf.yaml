exam_hint: 'Sucuri WAF (Web Application Firewall) is a cloud-based security solution that protects websites from attacks such as XSS, SQLi, and DDoS. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
