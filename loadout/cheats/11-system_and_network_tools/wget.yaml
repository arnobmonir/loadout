tool: wget
tags:
- network
- web
- m11
- cli
exam_hint: Non-interactive file downloader — HTTP/HTTPS/FTP wget is a command-line utility for downloading files from the internet using HTTP, HTTPS, and FTP protocols. It supports recursive downloads, resumable transfers, bandwidth limiting, and can continue
docs:
- man:wget
actions:
- title: download file
  desc: Download file from URL
  command: wget http://{{ip}}/{{target|file.txt}}
- title: mirror site
  desc: Recursive mirror (authorized lab, limited depth)
  command: wget -r -l 1 http://{{domain}}/
- title: spider only
  desc: Spider without downloading
  command: wget --spider -r -l 1 http://{{ip}}/
- title: Apt-get update
  desc: Runs `sudo` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
