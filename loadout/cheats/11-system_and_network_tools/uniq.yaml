exam_hint: 'uniq is a command-line utility that filters and analyzes duplicate consecutive lines in files. It removes, counts, or identifies duplicate entries. Essential for log analysis, data deduplication, and text processing pipelines. Works efficiently with sorted data to remove all duplicates. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
