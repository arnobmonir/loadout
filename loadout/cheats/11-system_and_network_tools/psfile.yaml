tool: psfile
tags:
- m11
- network
- cli
exam_hint: 'PsFile is a command-line utility from Microsoft Sysinternals that lists open files on local and remote computers. It identifies which users have files open across a network, useful for lateral movement, forensic investigation, and understanding system access patterns. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
