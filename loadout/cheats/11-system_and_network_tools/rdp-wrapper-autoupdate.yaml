tool: rdp-wrapper-autoupdate
tags:
- m11
- network
- cli
exam_hint: 'RDP Wrapper Library is an open-source project that enables Remote Desktop Protocol (RDP) on Windows editions that normally do not support it (Home editions), and allows multiple simultaneous RDP sessions on Windows workstations. While it has legitimate administrative uses, malware and threat actors use RDP Wrapper to establish persistent RDP backdoors on compromised systems—enabling GUI-based remo Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
- https://github.com/stascorp/rdpwrap
- https://attack.mitre.org/techniques/T1021/001/
- https://www.sans.org/reading-room/whitepapers/forensics/rdp-forensics-monitoring-and-detection-37532
actions:
- title: 'RDPWInst.exe -i #'
  desc: Runs `RDPWInst.exe` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'RDPWInst.exe -i # install RDP Wrapper'
- title: 'RDPWInst.exe -s #'
  desc: Runs `RDPWInst.exe` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'RDPWInst.exe -s # silent install'
- title: 'RDPWInst.exe -u #'
  desc: Runs `RDPWInst.exe` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'RDPWInst.exe -u # uninstall'
- title: Sc query termservice
  desc: Runs `sc` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'sc query termservice # check Terminal Services state'
- title: Netstat -an
  desc: Runs `netstat` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'netstat -an | findstr ":3389" # check RDP port listening'
- title: Get-Service -Name termservice
  desc: Runs `Get-Service` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: Get-Service -Name termservice
- title: Netsh advfirewall firewall
  desc: Runs `netsh` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
