tool: psloglist
tags:
- m11
- network
- cli
exam_hint: 'PsLogList is a Sysinternals command-line utility that reads the Windows Event Log from local and remote systems, dumping event log entries with filtering and formatting options. Essential for forensics, auditing, and covering tracks during post-exploitation. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
