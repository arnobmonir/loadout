tool: base64
tags:
- m11
- network
- cli
exam_hint: 'base64 encodes binary data using 64 printable ASCII characters, essential for transmitting non-text data in text protocols. Supports both encoding to base64 and decoding back to original format. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
