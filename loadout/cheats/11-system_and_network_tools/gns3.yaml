exam_hint: 'GNS3 (Graphical Network Simulator 3) is an open-source network emulator that allows users to design, build, and test complex network topologies using real router and switch firmware (Cisco IOS, Juniper JunOS) or virtual appliances. Security professionals use it to build realistic lab environments for testing malware propagation, network segmentation, firewall rules, and incident response exercises Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
