- https://www.gns3.com/
- https://docs.gns3.com/
actions:
- title: Gns3server --config /etc/gns3/gns3_server.conf
  desc: Runs `gns3server` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: gns3server --config /etc/gns3/gns3_server.conf &
- title: Curl http://localhost:3080/v2/projects
  desc: Runs `curl` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: curl http://localhost:3080/v2/projects
- title: Curl -X POST
  desc: Runs `curl` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: curl -X POST http://localhost:3080/v2/projects -d '{"name":"malware_lab"}'
