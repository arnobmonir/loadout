tool: tcp-port-telnet-monitoring
tags:
- m11
- network
- cli
exam_hint: 'TCP Port Telnet Monitoring refers to using the Telnet client or dedicated TCP port monitoring utilities to test connectivity to specific TCP ports, verify that services are listening, and probe for unexpectedly open ports on a system or network. During malware analysis and incident response, port monitoring tools are used to detect backdoors by identifying unusual listening ports opened by malware Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
- https://docs.microsoft.com/en-us/powershell/module/nettcpip/test-netconnection
- https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/netstat
actions:
- title: Telnet 192.168.1.10 4444
  desc: Runs `telnet` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'telnet 192.168.1.10 4444 # test if port 4444 is open'
- title: Telnet 192.168.1.10 80
  desc: Runs `telnet` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'telnet 192.168.1.10 80 # test HTTP connectivity'
- title: Dism /Online /Enable-Feature
  desc: Runs `dism` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: dism /Online /Enable-Feature /FeatureName:TelnetClient
- title: Test-NetConnection -ComputerName 192.168.1.10
  desc: Runs `Test-NetConnection` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: Test-NetConnection -ComputerName 192.168.1.10 -Port 4444
- title: Test-NetConnection -ComputerName 192.168.1.10 (2)
  desc: Runs `Test-NetConnection` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: Test-NetConnection -ComputerName 192.168.1.10 -Port 443 -InformationLevel Detailed
- title: Nc -zv 192.168.1.10
  desc: Runs `nc` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'nc -zv 192.168.1.10 4444 # -z = scan mode, -v = verbose'
- title: Nc -zv 192.168.1.10 (2)
  desc: Runs `nc` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'nc -zv 192.168.1.10 1-65535 # port scan all ports'
- title: Netstat -ano
  desc: Runs `netstat` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: netstat -ano | findstr "LISTENING"
- title: Netstat -b
  desc: Runs `netstat` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: netstat -b | findstr /i "LISTEN"
- title: Nmap -p 4444
  desc: Runs `nmap` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: nmap -p 4444 192.168.1.10
