exam_hint: 'ln (link) is a command-line utility that creates links to files or directories. Creates either hard links (direct references to inode) or symbolic links (reference to filename). Essential for file organization, creating shortcuts, and managing file references. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
