tool: ns-3
tags:
- m11
- network
- cli
exam_hint: 'ns-3 (Network Simulator 3) is a free, open-source discrete-event network simulator designed primarily for research and education. It provides detailed models of network protocols, channels, and devices, allowing researchers to simulate complex network scenarios including wired/wireless networks, routing protocols, and network security mechanisms. In a security context, ns-3 is used to simulate bot Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
- https://gitlab.com/nsnam/ns-3-dev.git
- https://gitlab.com/nsnam/ns-3-dev
- https://www.nsnam.org/
actions:
- title: Apt-get install
  desc: Runs `sudo` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: sudo apt-get install ns3
- title: Git clone https://gitlab.com/nsnam/ns-3-dev.git
  desc: Runs `git` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: git clone https://gitlab.com/nsnam/ns-3-dev.git
- title: Cd ns-3-dev &&
  desc: Runs `cd` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: cd ns-3-dev && ./ns3 configure && ./ns3 build
- title: Ns3 run scratch/my-simulation.cc
  desc: Runs `./ns3` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: ./ns3 run scratch/my-simulation.cc
- title: NS_LOG="ComponentName=level_all" ./ns3 run
  desc: Runs `NS_LOG="ComponentName=level_all"` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: NS_LOG="ComponentName=level_all" ./ns3 run scratch/simulation.cc
- title: Ns3 run simulation
  desc: Runs `./ns3` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: ./ns3 run simulation --vis
