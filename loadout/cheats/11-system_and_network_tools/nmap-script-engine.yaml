tool: nmap-script-engine
tags:
- m11
- network
- cli
exam_hint: 'Nmap Script Engine (NSE) is Nmap''s scripting subsystem used to automate service detection, vulnerability checks, and targeted enumeration tasks. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
docs:
- https://nmap.org/book/nse.html
- https://nmap.org/nsedoc/
actions:
- title: Nmap -sC 192.168.56.10
  desc: Runs `nmap` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: nmap -sC 192.168.56.10
- title: Nmap --script vuln
  desc: Runs `nmap` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: nmap --script vuln 192.168.56.10
- title: Nmap -p 80,443
  desc: Runs `nmap` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: nmap -p 80,443 --script http-title,http-headers 192.168.56.10
