exam_hint: 'Advanced IP Scanner is a free, lightweight GUI-based network scanning tool for Windows that quickly discovers all devices on your network. It provides basic service enumeration and device identification useful for initial network assessment and host discovery phases of penetration testing. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
