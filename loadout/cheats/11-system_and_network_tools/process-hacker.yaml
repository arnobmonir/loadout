- https://github.com/winsiderss/systeminformer
- https://processhacker.sourceforge.io/doc/
actions:
- title: 1. Right-click process
  desc: Runs `1.` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 1. Right-click process > Properties > Memory tab
- title: 2. Right-click >
  desc: Runs `2.` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 2. Right-click > Search memory (Ctrl+F within memory view)
- title: 3. Search for
  desc: Runs `3.` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 3. Search for string patterns, C2 IPs, or mutex names
- title: 1. Properties >
  desc: Runs `1.` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 1. Properties > Memory tab
- title: 2. Locate suspicious
  desc: Runs `2.` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 2. Locate suspicious region (e.g., RWX region not backed by a file)
- title: 3. Right-click >
  desc: Runs `3.` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
