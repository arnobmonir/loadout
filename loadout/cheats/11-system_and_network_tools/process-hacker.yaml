exam_hint: 'Process Hacker (now System Informer) is an open-source Windows process viewer and system monitoring tool that surpasses Task Manager and rivals Process Explorer in depth. It provides real-time monitoring of processes, threads, handles, memory regions, network connections, disk I/O, and services. Key capabilities for malware analysis include memory string searching, kernel object inspection, handle Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
