exam_hint: 'Service+ is a Windows service management utility that provides enhanced visibility and control over Windows services beyond what is available in the default Services MMC snap-in. It allows administrators to start, stop, pause, and configure services, view service dependencies, edit service properties, and monitor service status. During malware investigation, tools like Service+ are used to audit a Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
- https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/sc
- https://attack.mitre.org/techniques/T1543/003/
actions:
- title: Get-WmiObject Win32_Service
  desc: Runs `Get-WmiObject` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: Get-WmiObject Win32_Service | Select Name, DisplayName, PathName, State, StartMode | Format-Table -Wrap
- title: Get-WmiObject Win32_Service (2)
  desc: Runs `Get-WmiObject` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: Get-WmiObject Win32_Service | Where {$_.PathName -like "*temp*" -or $_.PathName -like "*appdata*"} | Select Name, PathName
- title: Get-WinEvent -FilterHashtable @{LogName='System';
  desc: Runs `Get-WinEvent` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: Get-WinEvent -FilterHashtable @{LogName='System'; Id=7045} | Select TimeCreated, Message
