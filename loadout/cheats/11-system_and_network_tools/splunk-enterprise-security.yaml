actions:
- title: Index=firewall action=blocked
  desc: Runs `index=firewall` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: index=firewall action=blocked
- title: Run command 2
  desc: Runs `|` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: '| stats dc(dest_port) as unique_ports values(dest_port) as ports by src_ip dest_ip'
- title: Run command 3
  desc: Runs `|` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: '| where unique_ports > 25'
- title: Run command 4
  desc: Runs `|` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: '| sort - unique_ports'
