exam_hint: 'HTTPort is a proxy tool that enables tunneling of network connections through HTTP proxies, often used to bypass network restrictions or firewalls. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
