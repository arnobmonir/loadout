exam_hint: 'zip is a command-line compression utility that creates cross-platform compressed archives. Stores multiple files with compression in a single .zip file that works on Windows, macOS, and Linux. Essential for file distribution, backup, and cross-platform sharing. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
