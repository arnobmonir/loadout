tool: pspasswd
tags:
- m11
- network
- cli
exam_hint: 'PsPasswd is a Sysinternals command-line utility that changes Windows user account passwords remotely on domain computers. Requires administrator privileges but enables password reset for lateral movement, privilege escalation, and account takeover scenarios. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
docs:
- https://live.sysinternals.com/pspasswd.exe
