exam_hint: 'dd (data duplicator) is a command-line utility for converting and copying files with low-level disk access. It reads from input files/devices, performs conversions, and writes to output files/devices. dd is essential for disk imaging, backup, forensic analysis, and raw data transfer. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
