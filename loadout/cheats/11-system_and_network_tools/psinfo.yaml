- cli
exam_hint: 'PsInfo is a Sysinternals command-line utility that retrieves detailed system configuration and information from local and remote Windows systems, including hardware, OS version, network configuration, installed patches, and security settings. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
