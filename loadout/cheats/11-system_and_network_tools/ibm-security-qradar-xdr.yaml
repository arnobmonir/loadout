tool: ibm-security-qradar-xdr
tags:
- m11
- network
- cli
exam_hint: 'IBM Security QRadar XDR extends the QRadar ecosystem with cross-domain detection and response by correlating endpoint, network, identity, cloud, and log telemetry. In network scanning countermeasures, QRadar XDR helps detect and investigate reconnaissance patterns such as repeated connection attempts, distributed scan sources, and suspicious probing against sensitive assets. It supports centralize Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
- https://www.ibm.com/products/qradar-xdr
actions:
- title: SELECT sourceip, destinationip,
  desc: Runs `SELECT` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: SELECT sourceip, destinationip, COUNT(DISTINCT destinationport) AS unique_ports
- title: FROM events
  desc: Runs `FROM` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: FROM events
- title: WHERE LOGSOURCETYPENAME(devicetype)='Firewall'
  desc: Runs `WHERE` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: WHERE LOGSOURCETYPENAME(devicetype)='Firewall'
- title: GROUP BY sourceip,
  desc: Runs `GROUP` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: GROUP BY sourceip, destinationip
- title: HAVING unique_ports >
  desc: Runs `HAVING` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: HAVING unique_ports > 25
- title: Nmap -sS -p
  desc: Runs `nmap` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: nmap -sS -p 1-1024 <target>
- title: Nmap -sU --top-ports
  desc: Runs `nmap` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: nmap -sU --top-ports 100 <target>
