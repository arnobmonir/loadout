exam_hint: 'tar (tape archive) is a command-line utility for creating and extracting archive files. Originally designed for tape backup, tar bundles multiple files and directories into a single archive while preserving file structure, permissions, and ownership. It''s essential for backups, software distribution, and file management in Linux/Unix systems. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
