exam_hint: 'VLANPWN is a tool for testing VLAN hopping and misconfiguration vulnerabilities in network environments, supporting exploitation and post-exploitation activities. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
