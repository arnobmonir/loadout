exam_hint: 'lsof (list open files) is a command-line utility that displays information about files opened by processes. Shows TCP/UDP network connections, regular files, directories, sockets, and pipes. Essential for troubleshooting, security auditing, and understanding process dependencies. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
