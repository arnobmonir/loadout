exam_hint: 'which is a command-line utility that locates executable files in the system PATH. Shows the full path to commands, helping identify which version of a program will execute. Essential for troubleshooting command conflicts and understanding system setup. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
