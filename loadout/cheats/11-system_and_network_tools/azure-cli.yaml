- cli
exam_hint: 'Azure CLI is Microsoft''s command-line interface for managing Azure cloud resources. In security assessments, Azure CLI is used to enumerate cloud infrastructure, identify misconfigurations, audit access controls, and detect security vulnerabilities in Azure cloud environments. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
docs:
- https://learn.microsoft.com/cli/azure/
- https://cisa.gov/
- https://learn.microsoft.com/
