exam_hint: 'Unvalidated Redirects and Forwards is a web vulnerability where an application redirects or forwards users to untrusted sites without proper validation, potentially aiding phishing or malware delivery. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
