tool: pskill
tags:
- m11
- network
- cli
exam_hint: 'PsKill is a command-line process termination utility from Sysinternals that kills processes on local and remote Windows systems by name or PID. Critical for exploitation, remediation, and anti-forensics during post-exploitation phases. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
