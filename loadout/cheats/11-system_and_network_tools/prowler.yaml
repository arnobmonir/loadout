tool: prowler
tags:
- m11
- network
- cli
exam_hint: 'Prowler is a security assessment tool for AWS cloud environments. It performs automated, comprehensive security audits to identify misconfigurations, compliance violations, and security weaknesses across AWS infrastructure. Prowler checks against AWS security best practices and compliance frameworks like CIS Benchmarks, GDPR, and PCI-DSS. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
