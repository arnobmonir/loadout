exam_hint: 'Flawfinder is an open-source static analysis tool that scans C and C++ source code for potential security vulnerabilities through pattern matching. It helps developers identify security weaknesses early in development. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
