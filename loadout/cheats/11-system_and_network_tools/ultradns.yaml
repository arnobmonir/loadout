actions:
- title: Dig +dnssec A
  desc: Runs `dig` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: dig +dnssec A example.com @dns1.ultradns.net
- title: Dig DS example.com
  desc: Runs `dig` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: 'dig DS example.com # check DS record at parent zone'
- title: Nslookup -type=NS example.com
  desc: Runs `nslookup` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: nslookup -type=NS example.com
- title: Dig NS example.com
  desc: Runs `dig` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: dig NS example.com
