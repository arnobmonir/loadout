tool: strace
tags:
- m11
- network
- cli
exam_hint: 'strace is a debugging tool that traces system calls and signals for a process. Shows all interactions between a program and the Linux kernel, including file operations, network calls, and signal handling. Essential for understanding program behavior, debugging issues, and security analysis. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
