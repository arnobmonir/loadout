exam_hint: 'Portable Executable (PE) is the standard Windows executable file format containing compiled code, resources, and metadata. Understanding PE structure is crucial for malware analysis and reverse engineering. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
