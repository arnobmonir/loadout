tool: adfind
tags:
- m11
- network
- cli
exam_hint: 'ADFind is a powerful command-line tool for querying and enumerating Active Directory. It allows penetration testers to search, retrieve, and modify AD objects using LDAP queries. It''s designed to be faster and more flexible than built-in AD tools, enabling comprehensive AD reconnaissance and enumeration during security assessments. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
docs:
- https://www.joeware.net/
actions:
- title: Adfind -b dc=domain,dc=com
  desc: Runs `adfind` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: adfind -b dc=domain,dc=com -f "objectClass=user" cn
- title: Adfind -users -csv
  desc: Runs `adfind` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: adfind -users -csv
