tool: psloggedon
tags:
- m11
- network
- cli
exam_hint: 'PsLoggedOn is a Sysinternals command-line utility that lists all currently logged-on users on local and remote Windows systems, showing both interactive and network sessions. Critical for identifying active user accounts for social engineering and lateral movement planning. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
docs:
