tool: icmp-flood
tags:
- m11
- network
- cli
exam_hint: 'ICMP Flood is a basic denial-of-service attack that sends massive quantities of ICMP Echo Request packets (ping) to the target without waiting for responses. The target''s internet connection becomes saturated with incoming ICMP traffic, consuming bandwidth and causing legitimate traffic to be dropped. ICMP floods are among the simplest yet effective volumetric DDoS attacks. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to lim'
