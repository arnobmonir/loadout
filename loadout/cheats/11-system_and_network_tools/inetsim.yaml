tool: inetsim
tags:
- m11
- network
- cli
exam_hint: 'INetSim (Internet Services Simulation Suite) is a Linux-based software suite that simulates common internet services (HTTP, HTTPS, DNS, SMTP, FTP, IRC, TFTP, POP3, etc.) in a local analysis environment. During dynamic malware analysis, all outbound traffic is redirected to INetSim, which responds with configurable fake responses. This allows the analyst to observe what network services the malware Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
docs:
- https://www.inetsim.org/documentation.html
- https://remnux.org/
- https://www.sans.org/reading-room/whitepapers/malicious/malware-analysis-lab-33690
actions:
- title: Apt-get install
  desc: Runs `sudo` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: sudo apt-get install inetsim
- title: Nano /etc/inetsim/inetsim.conf
  desc: Runs `sudo` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: sudo nano /etc/inetsim/inetsim.conf
- title: Inetsim
  desc: Runs `sudo` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
