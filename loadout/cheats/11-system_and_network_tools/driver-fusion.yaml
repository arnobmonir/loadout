exam_hint: 'Driver Fusion (by Treexy) is a Windows driver management and cleanup tool that updates, backs up, and removes drivers. A distinguishing feature is its driver cleanup capability—removing leftover/orphaned driver packages from Windows Driver Store that are no longer associated with installed hardware. This prevents confusion between legitimate current drivers and old driver packages that malware cou Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on th'
