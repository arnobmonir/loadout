- title: Pnputil /enum-drivers
  desc: Runs `pnputil` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: pnputil /enum-drivers
- title: Pnputil /delete-driver oem5.inf
