exam_hint: 'wc (word count) is a command-line utility that counts lines, words, characters, and bytes in files or stdin. Essential for file analysis, log analysis, and data statistics. Provides quick metrics for text processing and file size estimation. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
