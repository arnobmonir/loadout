exam_hint: 'ps (process status) is a command-line utility for displaying information about running processes. It shows process IDs (PIDs), memory usage, CPU usage, command line arguments, and other process details. ps is essential for system monitoring, debugging, and process management. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
