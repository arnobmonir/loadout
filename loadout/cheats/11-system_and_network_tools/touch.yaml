exam_hint: 'touch creates empty files and updates file access/modification timestamps. Essential for file creation, timestamp manipulation, and build system workflows. Does not modify file content if file already exists. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
