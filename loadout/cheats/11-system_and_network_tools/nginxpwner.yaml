exam_hint: 'NginxPwner is a tool for exploiting misconfigurations and vulnerabilities in Nginx web servers, supporting privilege escalation and post-exploitation activities. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
