exam_hint: 'Zenmap is the official graphical user interface for Nmap. It helps users run scans, save profiles, compare results, and visualize discovered hosts and services. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
