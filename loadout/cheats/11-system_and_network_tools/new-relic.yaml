actions:
- title: Npm install newrelic
  desc: Runs `npm` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: npm install newrelic
- title: Java -javaagent:/path/to/newrelic.jar -Dnewrelic.config.file
  desc: Runs `java` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: java -javaagent:/path/to/newrelic.jar -Dnewrelic.config.file=newrelic.yml -jar app.jar
- title: Curl -Ls https://download.newrelic.com/install/newrelic-cli/
  desc: Runs `curl` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: curl -Ls https://download.newrelic.com/install/newrelic-cli/scripts/install.sh | bash
- title: NEW_RELIC_API_KEY=<key> NEW_RELIC_ACCOUNT_ID=<id>
  desc: Runs `sudo` as part of the CEH workflow. nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise. Authorized lab targets only.
  command: sudo NEW_RELIC_API_KEY=<key> NEW_RELIC_ACCOUNT_ID=<id> /usr/local/bin/newrelic install
