exam_hint: 'Mercenary Spyware refers to commercial spyware tools and platforms used for targeted surveillance, data exfiltration, and monitoring, often sold to governments and organizations. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
