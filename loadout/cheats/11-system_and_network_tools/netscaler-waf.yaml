exam_hint: 'NetScaler WAF (Web Application Firewall) by Citrix is a security solution that protects web applications from common attacks such as XSS, SQLi, and CSRF. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface to limit noise.'
