exam_hint: 'DNS Amplification Attack (DNS Reflection Attack) is a distributed denial-of-service attack that exploits public DNS servers to generate large volumes of traffic directed at a target. The attacker sends DNS queries with a spoofed source IP (target''s IP) to public DNS servers, which respond with large data packets to the target, causing bandwidth exhaustion and service disruption. Strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with BPF filters on the pivot interface t'
