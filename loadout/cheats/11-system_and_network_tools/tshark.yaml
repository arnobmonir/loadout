tool: tshark
tags: [network, sniffing, wireshark, m12]
exam_hint: "Wireshark CLI — capture and dissect packets from terminal"
docs:
  - "man:tshark"

actions:
  - title: capture to file
    desc: Capture packets to pcap
    command: "tshark -i {{interface|eth0}} -w {{output|capture.pcap}}"

  - title: read pcap filter
    desc: Read pcap with display filter
    command: "tshark -r {{output|capture.pcap}} -Y 'http.request'"

  - title: live HTTP requests
    desc: Show HTTP requests live
    command: "tshark -i {{interface|eth0}} -Y 'http.request' -T fields -e http.host -e http.request.uri"
