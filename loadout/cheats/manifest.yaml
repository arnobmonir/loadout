categories:
  reconnaissance:
    description: DNS/WHOIS/RDAP lookups, subdomain and certificate discovery, and
      OSINT harvesting (emails, hosts, metadata) before sending probe traffic to the
      target.
    strategy: Passive sources first (subfinder, amass, theHarvester); validate with
      dig/host/whois; defer port scans until scanning phase.
  scanning_and_enumeration:
    description: Host discovery, TCP/UDP/SYN port scanning, service/version detection,
      and protocol-specific enumeration — SMB/RPC/LDAP, HTTP dir/vhost fuzz, and CMS
      fingerprinting.
    strategy: nmap -sn or masscan/rustscan sweep; -sV/-sC on hits; match enum tool
      to port (445→enum4linux, 80→gobuster/ffuf, 389→ldapsearch).
  vulnerability_assessment:
    description: Map service versions and misconfigs to CVEs and public PoCs; correlate
      scanner output with exploit-db and vendor advisories.
    strategy: Feed exact version strings into searchsploit/CVE DB; confirm build and
      config before escalating to exploit modules.
  exploitation:
    description: Weaponized delivery — SQLi, credential brute-force, Metasploit modules,
      and LLMNR/NBT-NS poisoning for session or shell access.
    strategy: Tie each exploit to a confirmed finding; set LHOST/LPORT/RHOST explicitly;
      isolate Responder/relay tools to lab segments.
  post_exploitation_and_privilege_escalation:
    description: Lateral movement, persistence, credential dumping, privilege escalation,
      and staged exfil after initial foothold.
    strategy: Establish stable shell first; enumerate local/domain privs; dump creds
      before noisy lateral moves; document every pivot host.
  defense_and_monitoring:
    description: IDS/IPS, honeypots, SIEM-style monitoring, and defensive visibility
      tools for detecting and analyzing attacker TTPs.
    strategy: Baseline normal traffic before tuning alerts; place honeypots on decoy
      VLANs; correlate IDS hits with PCAP for validation.
  cryptography_and_hashing:
    description: Offline hash identification and cracking (NTLM, bcrypt, WPA), plus
      encoding/decoding and crypto analysis workflows.
    strategy: Identify hash mode (hashcat -m / john format); start targeted wordlists
      and rules; crack service accounts before domain admins.
  malware_analysis_and_reverse_engineering:
    description: Static/dynamic malware triage, disassembly, sandbox execution, memory
      forensics, and mobile binary analysis in isolated environments.
    strategy: Never run unknown samples on host OS; static strings/hashes first; dynamic
      analysis only inside disposable VMs with snapshots.
  social_engineering_and_phishing:
    description: Phishing campaign frameworks, payload delivery pages, awareness testing,
      and social pretext tooling for authorized assessments.
    strategy: Scope recipient lists and landing pages; use isolated infra; track opens/clicks
      only within written authorization.
  cloud_iot_and_infrastructure:
    description: Cloud API/config auditing (AWS/Azure/GCP), container/K8s security,
      and IoT firmware/service assessment.
    strategy: Enumerate public buckets and IAM misconfigs first; scan container images
      for known CVEs; segment IoT devices from corp VLANs.
  system_and_network_tools:
    description: Raw sockets, reverse/bind shells, HTTP staging, PCAP capture, and
      general CLI utilities that support every engagement phase.
    strategy: nc/socat for relays; curl/wget for payload staging; tcpdump/tshark with
      BPF filters on the pivot interface to limit noise.
  wireless_and_network_attacks:
    description: Wi-Fi capture and cracking (802.11), deauth/evil-twin workflows,
      ARP/DNS spoofing, and DDoS/stress tooling for lab use.
    strategy: Monitor mode + channel lock before aircrack/wifite; isolate spoofing
      tools to test VLANs; never run DDoS outside isolated lab nets.
  authentication_and_access_control:
    description: Kerberos abuse (AS-REP, kerberoast), BloodHound AD pathing, default
      credential DBs, and access-control enumeration.
    strategy: Map AD attack paths with BloodHound before spraying; target AS-REP roastable
      and SPN accounts; respect lockout thresholds.
  mobile_and_endpoint_security:
    description: Android/iOS app analysis (MobSF, drozer, Appium), endpoint agent
      assessment, and mobile spyware/MDM awareness for CEH scope.
    strategy: Static APK/IPA analysis before dynamic; use emulators with no prod accounts;
      endpoint tools only on owned lab devices.
  compliance_and_reporting:
    description: Regulatory frameworks (PCI-DSS, HIPAA, GDPR), evidence handling,
      scope documentation, and legal/authorization references for reports.
    strategy: Tie every finding to control framework language; retain raw logs and
      screenshots; document ROE and authorization before testing.
