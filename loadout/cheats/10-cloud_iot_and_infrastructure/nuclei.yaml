tool: nuclei
tags: [cloud, web, vuln, m10]
exam_hint: "Template-based scanner — cloud misconfigs, CVEs, and exposed services"
docs:
  - https://github.com/projectdiscovery/nuclei

actions:
  - title: scan single host
    desc: Run nuclei templates against a target URL or host
    command: "nuclei -u http://{{ip}}"

  - title: scan with tags
    desc: Run only templates matching tag (e.g. cve, misconfig)
    command: "nuclei -u http://{{ip}} -tags {{user|cve}}"
