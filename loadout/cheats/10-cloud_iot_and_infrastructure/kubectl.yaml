exam_hint: 'kubectl is the official command-line interface (CLI) tool for Kubernetes. It allows users to deploy, inspect, modify, and delete Kubernetes resources. Kubectl communicates with the Kubernetes API server to manage cluster operations. Strategy: Enumerate public buckets and IAM misconfigs first; scan container images for known CVEs; segment IoT devices from corp VLANs.'
