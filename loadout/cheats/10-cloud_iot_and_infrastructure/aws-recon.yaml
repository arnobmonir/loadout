exam_hint: 'AWS recon refers to the process of discovering and profiling publicly exposed AWS resources such as S3 buckets, CloudFront endpoints, and service metadata tied to a target. Strategy: Enumerate public buckets and IAM misconfigs first; scan container images for known CVEs; segment IoT devices from corp VLANs.'
