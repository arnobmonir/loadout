exam_hint: 'KillerBee is a framework for testing and assessing the security of ZigBee and IEEE 802.15.4 networks and devices. It provides tools for capturing, analyzing, injecting, and exploiting vulnerabilities in wireless mesh networks commonly used in IoT and smart home applications. Strategy: Enumerate public buckets and IAM misconfigs first; scan container images for known CVEs; segment IoT devices from corp VLANs.'
