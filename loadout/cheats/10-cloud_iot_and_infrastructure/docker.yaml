tool: docker
tags:
- m10
- cloud
- iot
exam_hint: 'Docker is a containerization platform that packages applications and dependencies into lightweight, isolated containers. In the context of security assessment, understanding Docker configuration, identifying misconfigurations, and exploiting container vulnerabilities is critical for assessing cloud and microservices-based infrastructure security. Strategy: Enumerate public buckets and IAM misconfigs first; scan container images for known CVEs; segment IoT devices from corp VLANs.'
docs:
- https://docs.docker.com/engine/security/
- https://www.cisecurity.org/
- https://owasp.org/
