tool: gcloud
tags:
- m10
- cloud
- iot
exam_hint: 'gcloud is Google Cloud Platform''s official command-line interface for managing GCP resources. In security assessments, gcloud enables enumeration of GCP infrastructure, auditing IAM permissions, identifying access control weaknesses, and detecting security misconfigurations in Google Cloud environments. Strategy: Enumerate public buckets and IAM misconfigs first; scan container images for known CVEs; segment IoT devices from corp VLANs.'
