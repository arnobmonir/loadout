exam_hint: 'Kippo is an open-source SSH honeypot that simulates a vulnerable Linux shell. It captures attacker interactions and documents their activities for analysis, providing valuable intelligence on common attack patterns and attacker behavior. Strategy: Baseline normal traffic before tuning alerts; place honeypots on decoy VLANs; correlate IDS hits with PCAP for validation.'
