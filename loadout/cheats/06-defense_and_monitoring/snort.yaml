tool: snort
tags:
- defense
- ids
- m08
- m06
- monitoring
exam_hint: 'Network IDS — rule-based detection on live traffic or pcaps Snort — CEH 06 module tool. Strategy: Baseline normal traffic before tuning alerts; place honeypots on decoy VLANs; correlate IDS hits with PCAP for validation.'
docs:
- https://docs.snort.org/
- man:snort
actions:
- title: read pcap alert
  desc: Run Snort rules against a pcap in console mode
  command: snort -r {{output|capture.pcap}} -A console -c /etc/snort/snort.conf
- title: inline test config
  desc: Validate Snort config syntax before deployment
  command: snort -T -c /etc/snort/snort.conf
- title: Snort --help
  desc: Runs `snort` as part of the CEH workflow. Baseline normal traffic before tuning alerts; place honeypots on decoy VLANs; correlate IDS hits with PCAP for validation. Authorized lab targets only.
  command: snort --help
- title: Man snort
  desc: Runs `man` as part of the CEH workflow. Baseline normal traffic before tuning alerts; place honeypots on decoy VLANs; correlate IDS hits with PCAP for validation. Authorized lab targets only.
  command: man snort
