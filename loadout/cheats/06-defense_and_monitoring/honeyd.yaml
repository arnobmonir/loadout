exam_hint: 'Honeyd is a virtual honeypot framework that simulates entire networks of vulnerable services. It can emulate thousands of hosts and services simultaneously, creating a deceptive environment to detect and analyze attacks on network-level threats. Strategy: Baseline normal traffic before tuning alerts; place honeypots on decoy VLANs; correlate IDS hits with PCAP for validation.'
