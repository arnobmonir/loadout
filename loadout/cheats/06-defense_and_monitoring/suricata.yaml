tool: suricata
tags: [defense, ids, ips, m08]
exam_hint: "IDS/IPS engine — multi-threaded rule matching on pcaps or interfaces"
docs:
  - https://docs.suricata.io/
  - "man:suricata"

actions:
  - title: offline pcap analysis
    desc: Process a pcap with default ruleset
    command: "suricata -r {{output|capture.pcap}} -c /etc/suricata/suricata.yaml"

  - title: config test
    desc: Validate Suricata configuration before reload
    command: "suricata -T -c /etc/suricata/suricata.yaml"
